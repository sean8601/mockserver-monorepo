# Receive MockServer's OTLP metrics and re-export them on a Prometheus endpoint
# (port 8889) so the test can assert they arrived.
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889

service:
  pipelines:
    metrics:
      receivers: [otlp]
      exporters: [prometheus]
