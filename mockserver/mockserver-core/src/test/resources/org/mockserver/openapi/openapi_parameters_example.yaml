openapi: "3.0.0"
info:
  version: "1.0.0"
  title: "Parameter Validation Example"
paths:
  "/items/{itemId}":
    get:
      summary: "Get an item, exercising all four parameter locations"
      operationId: "getItem"
      parameters:
        - name: "itemId"
          in: "path"
          required: true
          schema:
            type: "integer"
            format: "int32"
        - name: "filter"
          in: "query"
          required: true
          schema:
            type: "string"
        - name: "X-Trace-Id"
          in: "header"
          required: true
          schema:
            type: "string"
            format: "uuid"
        - name: "session"
          in: "cookie"
          required: true
          schema:
            type: "string"
        - name: "page"
          in: "query"
          required: false
          schema:
            type: "integer"
            minimum: 1
      responses:
        "200":
          description: "ok"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  id:
                    type: "integer"
                  name:
                    type: "string"
  "/search":
    get:
      summary: "Search exercising array-typed parameters serialised in a non-JSON style"
      operationId: "search"
      parameters:
        - name: "status"
          in: "query"
          required: true
          schema:
            type: "array"
            items:
              type: "string"
        - name: "X-Tags"
          in: "header"
          required: true
          schema:
            type: "array"
            items:
              type: "string"
      responses:
        "200":
          description: "ok"
