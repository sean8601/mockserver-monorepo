---
openapi: 3.1.0
info:
  version: 1.0.0
  title: OpenAPI 3.1 Features Test
  summary: Tests OAS 3.1 constructs
paths:
  "/items":
    get:
      operationId: listItems
      summary: List items with nullable name (type array)
      responses:
        '200':
          description: an array of items
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                  properties:
                    id:
                      type: integer
                      format: int64
                    name:
                      type:
                        - string
                        - "null"
                    tags:
                      type:
                        - array
                        - "null"
                      items:
                        type: string
    post:
      operationId: createItem
      summary: Create an item with $ref siblings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Item'
      responses:
        '201':
          description: created item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
                description: The newly created item (sibling to $ref)
  "/items/{itemId}":
    get:
      operationId: getItemById
      summary: Get a single item by ID
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: a single item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '404':
          description: item not found
webhooks:
  itemCreated:
    post:
      operationId: onItemCreated
      summary: Webhook fired when an item is created
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Item'
      responses:
        '200':
          description: webhook acknowledged
  itemDeleted:
    post:
      operationId: onItemDeleted
      summary: Webhook fired when an item is deleted
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                itemId:
                  type: integer
                  format: int64
      responses:
        '200':
          description: webhook acknowledged
components:
  schemas:
    Item:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
          format: int64
          example: 42
        name:
          type:
            - string
            - "null"
          example: "Widget"
        status:
          type: string
          example: "active"
