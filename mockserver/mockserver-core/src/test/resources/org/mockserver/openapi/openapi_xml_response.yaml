---
openapi: 3.0.3
info:
  version: 1.0.0
  title: application/xml response body generation
paths:
  "/person":
    get:
      operationId: getPerson
      summary: Returns a person serialised as XML
      responses:
        '200':
          description: a person
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Person'
components:
  schemas:
    Person:
      type: object
      properties:
        name:
          type: string
        age:
          type: integer
          format: int32
