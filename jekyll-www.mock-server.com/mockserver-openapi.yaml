openapi: 3.0.0
servers:
  - url: 'http://localhost:1080/'
  - url: 'https://localhost:1080/'
info:
  title: MockServer API
  version: 7.2.0
  description: >-
    MockServer enables easy mocking of any system you integrate with via HTTP or HTTPS with clients written in Java, JavaScript and Ruby and a simple REST API (as shown below).


    MockServer Proxy is a proxy that introspects all proxied traffic including encrypted SSL traffic and supports Port Forwarding, Web Proxying (i.e. HTTP proxy), HTTPS Tunneling Proxying (using HTTP CONNECT) and SOCKS Proxying (i.e. dynamic port forwarding).


    Both MockServer and the MockServer Proxy record all received requests so that it is possible to verify exactly what requests have been sent by the system under test.


    MockServer also supports AI integration via MCP (Model Context Protocol), enabling AI agents and LLM-powered tools to programmatically create expectations, verify requests, and manage mock server state.
  license:
    url: 'https://github.com/mock-server/mockserver-monorepo/blob/master/LICENSE.md'
    name: Apache 2.0
tags:
  - name: expectation
    description: Create or update expectations - updates if the id matches an existing expectations (only supported by MockServer)
  - name: verify
    description: Verify requests (both MockServer & MockServer Proxy)
  - name: control
    description: Manage state or process (both MockServer & MockServer Proxy)
  - name: import
    description: Import expectations from external formats such as HAR or Postman collections (only supported by MockServer)
  - name: crud
    description: Register a generated CRUD data store backed REST resource (only supported by MockServer)
  - name: files
    description: Store, retrieve, list and delete files in the in-memory file store used by response templates and callbacks (only supported by MockServer)
  - name: chaos
    description: Register service-scoped, TCP and gRPC chaos / fault-injection profiles (only supported by MockServer)
  - name: drift
    description: Inspect and clear recorded mock drift (differences between expectations and observed responses)
  - name: audit
    description: Inspect the append-only, bounded, in-memory control-plane audit log of mutations (who/what/when/where/outcome); off by default (only supported by MockServer)
  - name: scenario
    description: Inspect, set and trigger stateful scenario state (timed auto-transitions and external triggers) (only supported by MockServer)
  - name: oidc
    description: Generate a turnkey OpenID Connect / OAuth2 provider as a set of expectations (only supported by MockServer)
  - name: saml
    description: Generate a turnkey SAML 2.0 identity provider as a set of expectations (only supported by MockServer)
  - name: scim
    description: Generate a turnkey SCIM 2.0 provisioning provider as a set of expectations (only supported by MockServer)
  - name: asyncapi
    description: Mock and verify AsyncAPI message brokers (only supported by MockServer when mockserver-async is on the classpath)
  - name: wasm
    description: Load and list WebAssembly custom rule modules (only supported by MockServer)
  - name: grpc
    description: Manage gRPC proto descriptors, services and health checking (only supported by MockServer)
  - name: troubleshooting
    description: Diagnose why requests did not match expectations (only supported by MockServer)
  - name: pact
    description: Export and verify Pact consumer-driven contracts (only supported by MockServer)
  - name: loadgen
    description: Drive API load against a target with a ramp profile and templated steps (SLI producer); off by default, enable with loadGenerationEnabled (only supported by MockServer)
  - name: slo
    description: Evaluate service-level objectives (latency percentiles, error rate) over a window and return a PASS / FAIL / INCONCLUSIVE verdict; off by default, enable with sloTrackingEnabled (only supported by MockServer)
  - name: contract
    description: Run an OpenAPI specification as a contract test against a live service (only supported by MockServer)

paths:
  /mockserver/expectation:
    put:
      tags:
        - expectation
      summary: create expectation
      responses:
        '201':
          description: expectations created
          content:
            application/json:
              schema:
                description: "list of upserted expectations"
                type: array
                additionalProperties: false
                items:
                  $ref: "#/components/schemas/Expectation"
        '400':
          description: incorrect request format
        '406':
          description: invalid expectation
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Expectations"
            example:
              httpRequest:
                method: GET
                path: /api/users
                queryStringParameters:
                  page:
                    - '1'
                  limit:
                    - '10'
              httpResponse:
                statusCode: 200
                headers:
                  Content-Type:
                    - application/json
                body: '{"users":[{"id":1,"name":"John Doe"}],"total":1}'
        description: expectation(s) to create
        required: true
  /mockserver/openapi:
    put:
      tags:
        - expectation
      summary: create expectations from OpenAPI or Swagger
      responses:
        '201':
          description: expectations created
          content:
            application/json:
              schema:
                description: "list of upserted expectations"
                type: array
                additionalProperties: false
                items:
                  $ref: "#/components/schemas/Expectation"
        '400':
          description: incorrect request format
        '406':
          description: invalid expectation
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenAPIExpectations"
            example:
              specUrlOrPayload: https://raw.githubusercontent.com/mock-server/mockserver-monorepo/master/mockserver/mockserver-integration-testing/src/main/resources/org/mockserver/openapi/openapi_petstore_example.json
              operationsAndResponses:
                listPets: '200'
                showPetById: '200'
        description: expectation(s) to create
        required: true
  /mockserver/clear:
    put:
      tags:
        - control
      summary: clears expectations and recorded requests that match the request matcher
      responses:
        '200':
          description: expectations and recorded requests cleared
        '400':
          description: incorrect request format
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [ "all", "log", "expectations" ]
            default: "all"
          required: false
          description: specifies the type of information to clear, default if not specified is "all", supported values are "all", "log", "expectations"
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/RequestDefinition"
                - $ref: "#/components/schemas/ExpectationId"
            example:
              path: /api/users
        description: request used to match expectations and record requests to clear
  /mockserver/reset:
    put:
      tags:
        - control
      summary: clears all expectations and recorded requests
      responses:
        '200':
          description: expectations and recorded requests cleared
  /mockserver/retrieve:
    put:
      tags:
        - control
      summary: retrieve recorded requests, active expectations, recorded expectations or log messages
      parameters:
        - in: query
          name: format
          schema:
            type: string
            enum: [ "java", "javascript", "python", "go", "csharp", "ruby", "rust", "php", "json", "log_entries", "har", "openapi", "postman", "bruno", "curl" ]
          required: false
          description: changes response format, default if not specified is "json", supported values are "java", "javascript", "python", "go", "csharp", "ruby", "rust", "php", "json", "log_entries", "har", "openapi", "postman", "bruno", "curl"
        - in: query
          name: type
          schema:
            type: string
            enum: [ "logs", "requests", "request_responses", "recorded_expectations", "active_expectations", "metrics" ]
          required: false
          description: specifies the type of object that is retrieve, default if not specified is "requests", supported values are "logs", "requests", "request_responses", "recorded_expectations", "active_expectations", "metrics"
      responses:
        '200':
          description: recorded requests or active expectations returned
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    additionalProperties: false
                    items:
                      $ref: "#/components/schemas/Expectation"
                  - type: array
                    additionalProperties: false
                    items:
                      $ref: "#/components/schemas/HttpRequest"
                  - type: array
                    additionalProperties: false
                    items:
                      $ref: "#/components/schemas/HttpRequestAndHttpResponse"
            application/java:
              schema:
                type: string
                description: Java code for the list of either Expectations or HttpResponses
            text/plain:
              schema:
                type: string
                description: List of recorded log messages
        '400':
          description: incorrect request format
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestDefinition"
            example:
              path: /api/users
        description: >-
          request used to match which recorded requests, expectations or log messages to return, an empty body matches all requests, expectations or log messages
  /mockserver/verify:
    put:
      tags:
        - verify
      summary: verify a request has been received a specific number of times
      responses:
        '202':
          description: matching request has been received specified number of times
        '400':
          description: incorrect request format
        '406':
          description: request has not been received specified numbers of times
          content:
            text/plain:
              schema:
                type: string
                description: 'JUnit expected:<...> but was:<...> format'
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Verification"
            example:
              httpRequest:
                method: GET
                path: /api/users
              times:
                atLeast: 1
        description: request matcher and the number of times to match
        required: true
  /mockserver/verifySequence:
    put:
      tags:
        - verify
      summary: verify a sequence of request has been received in the specific order
      responses:
        '202':
          description: request sequence has been received in specified order
        '400':
          description: incorrect request format
        '406':
          description: request sequence has not been received in specified order
          content:
            text/plain:
              schema:
                type: string
                description: 'JUnit expected:<...> but was:<...> format'
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerificationSequence"
            example:
              httpRequests:
                - method: POST
                  path: /api/login
                - method: GET
                  path: /api/dashboard
        description: the sequence of requests matchers
        required: true
  /mockserver/status:
    put:
      tags:
        - control
      summary: return listening ports
      responses:
        '200':
          description: MockServer is running and listening on the listed ports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ports"
  /mockserver/bind:
    put:
      tags:
        - control
      summary: bind additional listening ports
      description: only supported on Netty version
      responses:
        '200':
          description: >-
            listening on additional requested ports, note: the response ony
            contains ports added for the request, to list all ports use /status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ports"
        '400':
          description: incorrect request format
        '406':
          description: >-
            unable to bind to ports (i.e. already bound or JVM process doesn't
            have permission)
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Ports"
            example:
              ports:
                - 1090
        description: >-
          list of ports to bind to, where 0 indicates dynamically bind to any
          available port
        required: true
  /mockserver/openapi.yaml:
    get:
      tags:
        - control
      summary: retrieve the OpenAPI specification for MockServer
      description: returns the OpenAPI specification describing the MockServer REST API in YAML format
      responses:
        '200':
          description: OpenAPI specification returned
          content:
            application/yaml:
              schema:
                type: string
                description: OpenAPI specification in YAML format
  /mockserver/configuration:
    get:
      tags:
        - control
      summary: retrieve the current configuration
      description: returns the current MockServer configuration as JSON
      responses:
        '200':
          description: current configuration returned
          content:
            application/json:
              schema:
                type: object
                description: JSON object containing all configuration properties and their current values
    put:
      tags:
        - control
      summary: update the current configuration
      description: updates MockServer configuration properties at runtime, only non-null fields in the request body are applied
      responses:
        '200':
          description: configuration updated successfully, returns the full updated configuration
          content:
            application/json:
              schema:
                type: object
                description: JSON object containing all configuration properties and their current values after the update
        '400':
          description: incorrect request format
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: JSON object containing the configuration properties to update
            example:
              logLevel: INFO
        description: configuration properties to update, only non-null fields are applied
        required: true
  /mockserver/clock:
    put:
      tags:
        - control
      summary: control the server clock for deterministic time-based testing
      description: >-
        Freeze, advance, or reset MockServer's internal clock. The controllable clock affects
        response template date/time helpers (now_iso_8601, now_epoch, now_rfc_1123, dates.*) and
        expectation TimeToLive expiry. Event-log timestamps and JWT issuance are not affected.
      responses:
        '200':
          description: clock action applied successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClockResponse"
        '400':
          description: incorrect request format (missing or invalid action, invalid instant, non-positive duration)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClockRequest"
            example:
              action: freeze
              instant: '2026-01-15T10:00:00Z'
        description: clock action to perform
        required: true
    get:
      tags:
        - control
      summary: retrieve the current server clock status
      description: >-
        Returns the current instant, epoch milliseconds, and whether the clock is frozen.
      responses:
        '200':
          description: current clock status returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClockStatus"
  /mockserver/import:
    put:
      tags:
        - import
      summary: import expectations from a HAR or Postman collection
      description: >-
        Converts an HTTP Archive (HAR) export or a Postman collection into MockServer expectations and adds them.
        The format is auto-detected from the document structure or can be forced with the format query parameter.
      parameters:
        - in: query
          name: format
          schema:
            type: string
            enum: [ "har", "postman" ]
          required: false
          description: >-
            forces the import format, supported values are "har" and "postman"; when omitted the format is auto-detected from the request body
      responses:
        '201':
          description: expectations created from the imported document
          content:
            application/json:
              schema:
                description: "list of upserted expectations"
                type: array
                additionalProperties: false
                items:
                  $ref: "#/components/schemas/Expectation"
        '400':
          description: missing body, unsupported format, or unable to auto-detect the import format
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: a HAR export or Postman collection JSON document
            example:
              log:
                version: '1.2'
                entries:
                  - request:
                      method: GET
                      url: http://example.com/api/users
                      headers: []
                      queryString: []
                    response:
                      status: 200
                      headers: []
                      content:
                        text: '{"users":[{"id":1,"name":"Alice"}]}'
        description: HAR or Postman collection JSON document to import
        required: true
  /mockserver/crud:
    put:
      tags:
        - crud
      summary: register a generated CRUD data store
      description: >-
        Registers a REST resource backed by an in-memory data store that automatically handles
        list, read, create, update and delete operations under the supplied base path.
      responses:
        '201':
          description: CRUD resource registered
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  basePath:
                    type: string
                  idStrategy:
                    type: string
        '400':
          description: missing basePath or failed to register CRUD resource
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrudExpectationsDefinition"
            example:
              basePath: /api/users
              idField: id
              idStrategy: AUTO_INCREMENT
              initialData:
                - id: 1
                  name: Alice
                  email: alice@example.com
                - id: 2
                  name: Bob
                  email: bob@example.com
        description: CRUD resource definition including the base path and id strategy
        required: true
  /mockserver/files/store:
    put:
      tags:
        - files
      summary: store a file in the file store
      description: stores a file (text or base64-encoded binary) under the supplied name in the in-memory file store
      responses:
        '201':
          description: file stored
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  name:
                    type: string
                  size:
                    type: integer
        '400':
          description: request body missing the required 'name' and 'content' fields, or empty body
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileStoreRequest"
            example:
              name: template.json
              content: '{"status":"ok"}'
        description: file name and content to store
        required: true
  /mockserver/files/retrieve:
    put:
      tags:
        - files
      summary: retrieve a file from the file store
      description: returns the raw bytes of a previously stored file
      responses:
        '200':
          description: file content returned
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: request body missing the required 'name' field
        '404':
          description: file not found
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                name:
                  type: string
              required:
                - name
            example:
              name: template.json
        description: name of the file to retrieve
        required: true
  /mockserver/files/list:
    put:
      tags:
        - files
      summary: list files in the file store
      description: returns the names of all files currently held in the in-memory file store
      responses:
        '200':
          description: list of file names returned
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '400':
          description: failed to list files
  /mockserver/files/delete:
    put:
      tags:
        - files
      summary: delete a file from the file store
      description: removes a previously stored file from the in-memory file store
      responses:
        '200':
          description: file deleted
        '400':
          description: request body missing the required 'name' field
        '404':
          description: file not found
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                name:
                  type: string
              required:
                - name
            example:
              name: template.json
        description: name of the file to delete
        required: true
  /mockserver/serviceChaos:
    put:
      tags:
        - chaos
      summary: register, remove or clear service-scoped HTTP chaos
      description: >-
        Registers an HTTP chaos / fault-injection profile for a downstream host, removes a host's profile,
        or clears all service-scoped chaos. Supply a 'host' with a 'chaos' object to register, 'host' with
        'remove':true (or no 'chaos') to remove a single host, or 'clear':true to clear all.
      responses:
        '200':
          description: chaos registered, removed, patched or cleared
          content:
            application/json:
              schema:
                type: object
        '400':
          description: invalid request body or invalid chaos profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceChaosRequest"
            example:
              host: payments.internal:8443
              chaos:
                errorStatus: 503
                errorProbability: 0.3
                latency:
                  timeUnit: MILLISECONDS
                  value: 200
              ttlMillis: 60000
        description: service chaos registration, removal or clear instruction
        required: true
    get:
      tags:
        - chaos
      summary: list registered service-scoped HTTP chaos
      description: returns all registered service-scoped chaos profiles keyed by host, plus any remaining time-to-live
      responses:
        '200':
          description: registered service-scoped chaos returned
          content:
            application/json:
              schema:
                type: object
    patch:
      tags:
        - chaos
      summary: update an existing service-scoped HTTP chaos profile (JSON Merge Patch)
      description: >-
        Applies a JSON Merge Patch to an already-registered service-scoped chaos profile for a host,
        updating only the supplied fields and leaving the rest unchanged.
      responses:
        '200':
          description: chaos profile patched
          content:
            application/json:
              schema:
                type: object
        '400':
          description: invalid request body, unknown host, or invalid chaos profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceChaosRequest"
            example:
              host: payments.internal:8443
              chaos:
                errorProbability: 0.5
        description: JSON Merge Patch with 'host' and the chaos fields to update
        required: true
  /mockserver/tcpChaos:
    put:
      tags:
        - chaos
      summary: register, remove or clear TCP chaos
      description: >-
        Registers a TCP-layer chaos / fault-injection profile for a downstream host, removes a host's profile,
        or clears all TCP chaos. Supply a 'host' with a 'chaos' object to register, 'host' with 'remove':true
        (or no 'chaos') to remove a single host, or 'clear':true to clear all.
      responses:
        '200':
          description: chaos registered, removed, patched or cleared
          content:
            application/json:
              schema:
                type: object
        '400':
          description: invalid request body or invalid chaos profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: >-
                TCP chaos registration, removal or clear instruction with 'host', optional 'chaos', 'remove',
                'clear' and 'ttlMillis' fields
            example:
              host: slow-api.example.com
              chaos:
                bandwidthBytesPerSec: 1024
                latencyMs: 50
              ttlMillis: 30000
        description: TCP chaos registration, removal or clear instruction
        required: true
    get:
      tags:
        - chaos
      summary: list registered TCP chaos
      description: returns all registered TCP chaos profiles keyed by host, plus any remaining time-to-live
      responses:
        '200':
          description: registered TCP chaos returned
          content:
            application/json:
              schema:
                type: object
    patch:
      tags:
        - chaos
      summary: update an existing TCP chaos profile (JSON Merge Patch)
      description: >-
        Applies a JSON Merge Patch to an already-registered TCP chaos profile for a host,
        updating only the supplied fields and leaving the rest unchanged.
      responses:
        '200':
          description: chaos profile patched
          content:
            application/json:
              schema:
                type: object
        '400':
          description: invalid request body, unknown host, or invalid chaos profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: JSON Merge Patch with 'host' and the TCP chaos fields to update
            example:
              host: slow-api.example.com
              chaos:
                slicerChunkSize: 256
        description: JSON Merge Patch with 'host' and the TCP chaos fields to update
        required: true
  /mockserver/grpcChaos:
    put:
      tags:
        - chaos
      summary: register, remove or clear gRPC chaos
      description: >-
        Registers a gRPC chaos / fault-injection profile for a service, removes a service's profile,
        or clears all gRPC chaos. Supply a 'service' with a 'chaos' object to register, 'service' with
        'remove':true (or no 'chaos') to remove a single service, or 'clear':true to clear all.
      responses:
        '200':
          description: chaos registered, removed, patched or cleared
          content:
            application/json:
              schema:
                type: object
        '400':
          description: invalid request body or invalid chaos profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: >-
                gRPC chaos registration, removal or clear instruction with 'service', optional 'chaos', 'remove',
                'clear' and 'ttlMillis' fields
            example:
              service: com.example.OrderService
              chaos:
                errorStatusCode: UNAVAILABLE
                errorMessage: service maintenance
                errorProbability: 0.5
                latencyMs: 100
        description: gRPC chaos registration, removal or clear instruction
        required: true
    get:
      tags:
        - chaos
      summary: list registered gRPC chaos
      description: returns all registered gRPC chaos profiles keyed by service, plus any remaining time-to-live
      responses:
        '200':
          description: registered gRPC chaos returned
          content:
            application/json:
              schema:
                type: object
    patch:
      tags:
        - chaos
      summary: update an existing gRPC chaos profile (JSON Merge Patch)
      description: >-
        Applies a JSON Merge Patch to an already-registered gRPC chaos profile for a service,
        updating only the supplied fields and leaving the rest unchanged.
      responses:
        '200':
          description: chaos profile patched
          content:
            application/json:
              schema:
                type: object
        '400':
          description: invalid request body, unknown service, or invalid chaos profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: JSON Merge Patch with 'service' and the gRPC chaos fields to update
            example:
              service: com.example.OrderService
              chaos:
                errorProbability: 0.8
        description: JSON Merge Patch with 'service' and the gRPC chaos fields to update
        required: true
  /mockserver/drift:
    get:
      tags:
        - drift
      summary: retrieve recorded mock drift
      description: >-
        Returns recorded drift records (differences between expectations and observed responses),
        optionally filtered by expectation id and limited in count.
      parameters:
        - in: query
          name: expectationId
          schema:
            type: string
          required: false
          description: only return drift records for the given expectation id
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 500
          required: false
          description: maximum number of recent drift records to return (default 50, capped at 500), ignored when expectationId is supplied
      responses:
        '200':
          description: drift records returned
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  count:
                    type: integer
                  drifts:
                    type: array
                    items:
                      type: object
        '400':
          description: failed to retrieve drift records
  /mockserver/drift/clear:
    put:
      tags:
        - drift
      summary: clear all recorded mock drift
      description: removes all recorded drift records
      responses:
        '200':
          description: drift records cleared
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: string
  /mockserver/audit:
    get:
      tags:
        - audit
      summary: retrieve the control-plane audit log
      description: >-
        Returns the most-recent control-plane audit entries (one per authorised control-plane
        mutation, newest first). Off by default — enable with controlPlaneAuditEnabled. Each entry
        records redacted, structural metadata only (method, control-plane path with query string
        dropped, logical operation, source address, best-effort principal, outcome); it never
        contains request headers or bodies.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 200
            maximum: 1000
          required: false
          description: maximum number of recent audit entries to return (default 200, capped at 1000)
      responses:
        '200':
          description: audit entries returned (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  properties:
                    epochTimeMs:
                      type: integer
                      format: int64
                    method:
                      type: string
                    path:
                      type: string
                    operation:
                      type: string
                    sourceAddress:
                      type: string
                    principal:
                      type: string
                    principalSource:
                      type: string
                      enum: [jwt, mtls, none]
                    outcome:
                      type: string
                    summary:
                      type: string
                      nullable: true
        '400':
          description: failed to retrieve audit entries
  /mockserver/scenario:
    get:
      tags:
        - scenario
      summary: list all scenarios and their current state
      description: >-
        Returns every known stateful scenario and its current state. Scenarios are created
        implicitly by registering expectations with a scenarioName / scenarioState, or explicitly
        via PUT /mockserver/scenario/{name}. All scenario state is reset when MockServer is reset.
      responses:
        '200':
          description: scenarios listed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  scenarios:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      properties:
                        scenarioName:
                          type: string
                        currentState:
                          type: string
        '400':
          description: failed to list scenarios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioError'
  '/mockserver/scenario/{name}':
    get:
      tags:
        - scenario
      summary: get the current state of one scenario
      description: Returns the current state of the named scenario (null when the scenario has no state yet).
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
          description: the scenario name
      responses:
        '200':
          description: scenario state returned
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  scenarioName:
                    type: string
                  currentState:
                    type: string
                    nullable: true
        '400':
          description: failed to get scenario state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioError'
    put:
      tags:
        - scenario
      summary: set a scenario's state, optionally scheduling a timed auto-transition
      description: >-
        Sets the named scenario to the given state immediately. Optionally schedules a timed
        auto-transition to nextState after transitionAfterMs milliseconds; the transition only
        fires if the scenario is still in the set state when the timer expires, and scheduling a
        new transition cancels any pending one.
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
          description: the scenario name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - state
              properties:
                state:
                  type: string
                  description: the state to set immediately
                transitionAfterMs:
                  type: integer
                  format: int64
                  description: delay in milliseconds before auto-transitioning to nextState (requires nextState)
                nextState:
                  type: string
                  description: the state to auto-transition to after transitionAfterMs (requires transitionAfterMs)
            examples:
              setState:
                summary: set state immediately
                value:
                  state: Deploying
              timedTransition:
                summary: set state with timed auto-transition
                value:
                  state: Deploying
                  transitionAfterMs: 5000
                  nextState: Deployed
            example:
              state: Pending
              transitionAfterMs: 5000
              nextState: Completed
      responses:
        '200':
          description: scenario state set
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  scenarioName:
                    type: string
                  currentState:
                    type: string
                  nextState:
                    type: string
                  transitionAfterMs:
                    type: integer
                    format: int64
        '400':
          description: invalid request (e.g. missing scenario name or state field)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioError'
  '/mockserver/scenario/{name}/trigger':
    put:
      tags:
        - scenario
      summary: externally trigger a scenario state transition
      description: >-
        Advances the named scenario to newState immediately. Intended for driving a scenario
        forward from a test harness or CI pipeline.
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
          description: the scenario name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - newState
              properties:
                newState:
                  type: string
                  description: the state to transition the scenario to
            example:
              newState: Failed
      responses:
        '200':
          description: scenario state transition triggered
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  scenarioName:
                    type: string
                  currentState:
                    type: string
        '400':
          description: invalid request (e.g. missing scenario name or newState field)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioError'
  /mockserver/oidc:
    put:
      tags:
        - oidc
      operationId: mockOidcProvider
      summary: generate a turnkey OIDC / OAuth2 provider
      description: >-
        Generates a set of expectations that emulate an OpenID Connect / OAuth2 provider (discovery document,
        JWKS, token, authorize, userinfo and related endpoints) and adds them. An empty body uses the default
        provider configuration.
      responses:
        '201':
          description: OIDC provider expectations created
          content:
            application/json:
              schema:
                description: "list of upserted expectations"
                type: array
                additionalProperties: false
                items:
                  $ref: "#/components/schemas/Expectation"
        '400':
          description: incorrect request format
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: OIDC provider configuration; an empty body uses defaults
              properties:
                issuer:
                  type: string
                  description: issuer URL advertised in the discovery document and token claims
                clientId:
                  type: string
                  description: OAuth2 client identifier
                clientSecret:
                  type: string
                  writeOnly: true
                  description: OAuth2 client secret
                privateKeyPem:
                  type: string
                  writeOnly: true
                  description: PEM-encoded signing private key (never serialized back in responses)
                scopes:
                  type: array
                  items:
                    type: string
                  description: supported OAuth2 / OIDC scopes
                tokenExpirySeconds:
                  type: integer
                  description: lifetime of issued access tokens in seconds
            example:
              issuer: http://localhost:1080
              clientId: my-app
              subject: test-user
              audience: api://my-api
              scopes:
                - openid
                - profile
                - email
              tokenExpirySeconds: 7200
        description: OIDC provider configuration
        required: false
  /mockserver/saml:
    put:
      tags:
        - saml
      operationId: mockSamlProvider
      summary: generate a turnkey SAML identity provider
      description: >-
        Generates a set of expectations that emulate a SAML 2.0 identity provider (metadata, single sign-on and
        single logout endpoints) and adds them. An empty body uses the default provider configuration.
      responses:
        '201':
          description: SAML provider expectations created
          content:
            application/json:
              schema:
                description: "list of upserted expectations"
                type: array
                additionalProperties: false
                items:
                  $ref: "#/components/schemas/Expectation"
        '400':
          description: incorrect request format
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: SAML provider configuration; an empty body uses defaults
              properties:
                idpEntityId:
                  type: string
                  description: identity provider entity ID advertised in metadata
                spEntityId:
                  type: string
                  description: service provider entity ID the assertions are issued for
                signingCertificatePem:
                  type: string
                  description: PEM-encoded X.509 certificate used to verify signed assertions
                signingPrivateKeyPem:
                  type: string
                  writeOnly: true
                  description: PEM-encoded private key used to sign assertions
            example:
              idpEntityId: http://localhost:1080/saml/idp
              spEntityId: urn:my-app:sp
              scopes:
                - profile
                - email
        description: SAML provider configuration
        required: false
  /mockserver/scim:
    put:
      tags:
        - scim
      operationId: mockScimProvider
      summary: generate a turnkey SCIM provisioning provider
      description: >-
        Generates a set of expectations that emulate a SCIM 2.0 provisioning provider (Users, Groups and
        ServiceProviderConfig endpoints) and adds them. An empty body uses the default provider configuration.
      responses:
        '201':
          description: SCIM provider expectations created
          content:
            application/json:
              schema:
                description: "list of upserted expectations"
                type: array
                additionalProperties: false
                items:
                  $ref: "#/components/schemas/Expectation"
        '400':
          description: incorrect request format
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: SCIM provider configuration; an empty body uses defaults
              properties:
                basePath:
                  type: string
                  description: base path the SCIM endpoints are served under
                requireBearerToken:
                  type: boolean
                  description: whether requests must present a bearer token
                expectedBearerToken:
                  type: string
                  writeOnly: true
                  description: bearer token that incoming requests must present when required
            example:
              basePath: /scim/v2
              requireBearerToken: true
        description: SCIM provider configuration
        required: false
  /mockserver/asyncapi:
    put:
      tags:
        - asyncapi
      summary: load an AsyncAPI specification
      description: >-
        Loads an AsyncAPI specification (JSON or YAML), or a { spec, brokerConfig } document, to mock the
        described message broker. Requires the mockserver-async module on the classpath.
      responses:
        '201':
          description: AsyncAPI specification loaded
          content:
            application/json:
              schema:
                type: object
        '400':
          description: empty or invalid AsyncAPI specification
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '501':
          description: AsyncAPI messaging module is not available on the classpath
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: an AsyncAPI specification (JSON/YAML) or a { spec, brokerConfig } document
            example:
              spec: |-
                asyncapi: 2.6.0
                info:
                  title: Test Service
                  version: 1.0.0
                channels:
                  user/signedup:
                    publish:
                      message:
                        payload:
                          type: object
                          properties:
                            userId:
                              type: string
        description: AsyncAPI specification or spec plus broker configuration
        required: true
    get:
      tags:
        - asyncapi
      summary: retrieve AsyncAPI mock status
      description: returns the status of the currently loaded AsyncAPI mock. Requires the mockserver-async module on the classpath.
      responses:
        '200':
          description: AsyncAPI status returned
          content:
            application/json:
              schema:
                type: object
        '501':
          description: AsyncAPI messaging module is not available on the classpath
  /mockserver/asyncapi/verify:
    put:
      tags:
        - asyncapi
      summary: verify AsyncAPI messages
      description: >-
        Verifies that messages were published/received against the loaded AsyncAPI mock.
        Requires the mockserver-async module on the classpath.
      responses:
        '202':
          description: verification passed
        '400':
          description: empty or invalid verification request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '406':
          description: verification failed
          content:
            text/plain:
              schema:
                type: string
                description: human-readable description of the verification failure
        '501':
          description: AsyncAPI messaging module is not available on the classpath
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: AsyncAPI message verification request
            example:
              channel: user/signedup
              count:
                atLeast: 0
        description: AsyncAPI message verification request
        required: true
  /mockserver/wasm/modules:
    put:
      tags:
        - wasm
      summary: load a WebAssembly custom rule module
      description: stores a compiled WebAssembly module (raw .wasm bytes) under the name supplied in the query parameter
      parameters:
        - in: query
          name: name
          schema:
            type: string
          required: true
          description: name to register the WASM module under
      responses:
        '201':
          description: WASM module loaded
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: string
                  moduleName:
                    type: string
        '400':
          description: missing 'name' query parameter or empty module body
      requestBody:
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
              description: raw compiled WebAssembly (.wasm) module bytes
        description: Binary upload of a compiled WebAssembly module. Disabled by default — enable with `MOCKSERVER_WASM_ENABLED=true` (or `-Dmockserver.wasmEnabled=true`). Requires the `?name=<moduleName>` query parameter. Send the raw .wasm bytes with Content-Type application/octet-stream.
        required: true
    get:
      tags:
        - wasm
      summary: list loaded WebAssembly modules
      description: returns the names of all currently loaded WebAssembly custom rule modules
      responses:
        '200':
          description: list of WASM module names returned
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '400':
          description: failed to list WASM modules
  /mockserver/grpc/descriptors:
    put:
      tags:
        - grpc
      summary: load a gRPC proto descriptor set
      description: loads a compiled protobuf FileDescriptorSet (raw bytes) so gRPC services can be matched and mocked
      responses:
        '201':
          description: descriptor set loaded
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: string
        '400':
          description: empty descriptor set body or failed to load descriptor
      requestBody:
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
              description: compiled protobuf FileDescriptorSet bytes
        description: Binary upload of a compiled protobuf FileDescriptorSet (the .desc file produced by `protoc --descriptor_set_out`). Send the raw bytes with Content-Type application/octet-stream.
        required: true
  /mockserver/grpc/health:
    put:
      tags:
        - grpc
      summary: set a gRPC health serving status
      description: >-
        Sets the gRPC health-checking serving status for a service (an empty service name sets the default),
        or removes a service override with 'remove':true.
      responses:
        '200':
          description: serving status set or removed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: string
                  service:
                    type: string
                  servingStatus:
                    type: string
        '400':
          description: missing or invalid 'service' / 'status' fields
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                service:
                  type: string
                  description: gRPC service name; an empty string sets the default status
                status:
                  type: string
                  enum: [ "UNKNOWN", "SERVING", "NOT_SERVING", "SERVICE_UNKNOWN" ]
                remove:
                  type: boolean
                  description: when true, removes the service override
            example:
              service: helloworld.Greeter
              status: SERVING
        description: gRPC service name and serving status
        required: true
    get:
      tags:
        - grpc
      summary: retrieve gRPC health serving statuses
      description: returns the configured gRPC health serving status for each service (the default is reported under "_default")
      responses:
        '200':
          description: serving statuses returned
          content:
            application/json:
              schema:
                type: object
        '400':
          description: failed to get gRPC health status
  /mockserver/mode:
    put:
      tags:
        - control
      summary: set the proxy / mock operating mode
      description: >-
        Sets the operating mode that controls how unmatched requests are handled.
        SIMULATE matches expectations and returns a 404 for unmatched requests;
        SPY matches expectations but forwards (and records) unmatched requests to the real downstream;
        CAPTURE forwards and records all traffic (the same proxy-on-no-match behaviour as SPY).
      parameters:
        - in: query
          name: mode
          schema:
            type: string
            enum: [ "SIMULATE", "SPY", "CAPTURE" ]
          required: true
          description: the operating mode to set
      responses:
        '200':
          description: mode set successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  mode:
                    type: string
                    enum: [ "SIMULATE", "SPY", "CAPTURE" ]
                  proxyUnmatchedRequests:
                    type: boolean
        '400':
          description: missing or unknown mode
    get:
      tags:
        - control
      summary: retrieve the current proxy / mock operating mode
      description: returns the current operating mode and whether unmatched requests are proxied
      responses:
        '200':
          description: current mode returned
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  mode:
                    type: string
                    enum: [ "SIMULATE", "SPY", "CAPTURE" ]
                  proxyUnmatchedRequests:
                    type: boolean
  /mockserver/cassettes:
    put:
      tags:
        - control
      summary: register or update a record/replay cassette
      description: >-
        Registers (or updates) a cassette entry in the in-memory cassette registry from a JSON body.
        The 'path' field is required; 'filename', 'expectationCount' and 'origin' are optional.
      responses:
        '201':
          description: cassette registered
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  path:
                    type: string
                  filename:
                    type: string
                  expectationCount:
                    type: integer
                  origin:
                    type: string
                  lastUsed:
                    type: integer
                    format: int64
        '400':
          description: missing request body or missing 'path' field
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - path
              properties:
                path:
                  type: string
                  description: cassette path (required, used as the registry key)
                filename:
                  type: string
                expectationCount:
                  type: integer
                origin:
                  type: string
            example:
              path: /api/users
              filename: users-cassette.json
              expectationCount: 3
              origin: test
        description: cassette registration details
        required: true
    get:
      tags:
        - control
      summary: list registered cassettes
      description: returns all registered cassettes held in the in-memory cassette registry
      responses:
        '200':
          description: registered cassettes returned
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  cassettes:
                    type: array
                    items:
                      type: object
    delete:
      tags:
        - control
      summary: remove a registered cassette
      description: >-
        removes a cassette by path, supplied either as the 'path' query parameter or a JSON body with a 'path' field
      parameters:
        - in: query
          name: path
          schema:
            type: string
          required: false
          description: path of the cassette to remove (alternatively supply 'path' in the request body)
      responses:
        '200':
          description: removal processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  removed:
                    type: boolean
        '400':
          description: path missing from both query parameter and body
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                path:
                  type: string
            example:
              path: /api/users
        description: path of the cassette to remove (alternative to the query parameter)
        required: false
  /mockserver/diff:
    put:
      tags:
        - verify
      summary: compare two HTTP requests field-by-field
      description: >-
        Diffs an 'expected' against an 'actual' HttpRequest and returns the per-field differences,
        a total diff count and whether the two requests are identical.
      responses:
        '200':
          description: diff computed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  diffCount:
                    type: integer
                  identical:
                    type: boolean
                  diffs:
                    type: array
                    items:
                      type: object
        '400':
          description: missing body, missing 'expected'/'actual' fields, or non-HttpRequest definitions
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - expected
                - actual
              properties:
                expected:
                  $ref: "#/components/schemas/HttpRequest"
                actual:
                  $ref: "#/components/schemas/HttpRequest"
            example:
              expected:
                method: GET
                path: /api/pets
                headers:
                  Accept:
                    - application/json
              actual:
                method: GET
                path: /api/pets
                headers:
                  Accept:
                    - text/xml
        description: the two HTTP requests to compare
        required: true
  /mockserver/replay:
    put:
      tags:
        - control
      summary: replay a previously recorded request to its original target
      description: >-
        Re-issues a previously recorded or proxied HTTP request to its upstream target and returns the
        upstream response. The target host/port is resolved from the socketAddress field or the Host
        header in the submitted HttpRequest JSON. Subject to the SSRF policy
        (mockserver.forwardProxyBlockPrivateNetworks) and a 10 MB body-size cap on both the outbound
        request and the upstream response.
      responses:
        '200':
          description: upstream response returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HttpResponse"
        '400':
          description: missing or unparseable HttpRequest body
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '403':
          description: replay blocked by SSRF policy (target is a private/loopback/metadata address)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '413':
          description: request body exceeds maximum replay size
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '501':
          description: replay not available (no HTTP client wired)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '502':
          description: upstream connection failed or upstream response body exceeds maximum size
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HttpRequest"
            example:
              method: PUT
              path: /mockserver/status
              headers:
                Host:
                  - localhost:1080
        description: the HTTP request to replay to its original upstream target
        required: true
  /mockserver/breakpoint/matcher:
    put:
      tags:
        - control
      summary: register a breakpoint matcher
      description: >-
        Registers a request matcher that activates breakpoints for forwarded/proxied exchanges.
        When a proxied request matches the httpRequest definition, the exchange is paused at each
        specified phase. Returns the assigned matcher id and the registered phases.
        The clientId field is required — paused items are dispatched over the callback WebSocket
        (/_mockserver_callback_websocket) to the owning client for interactive resolution.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - httpRequest
                - phases
                - clientId
              properties:
                httpRequest:
                  $ref: "#/components/schemas/HttpRequest"
                  description: request matcher — same fields as an expectation request matcher
                phases:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    enum: [REQUEST, RESPONSE, RESPONSE_STREAM, INBOUND_STREAM]
                  description: phases at which matching exchanges will be paused
                clientId:
                  type: string
                  description: >-
                    Required. The callback WebSocket client id to dispatch paused items to
                    for interactive resolution. Must be a connected callback client.
            example:
              httpRequest:
                method: GET
                path: /api/test
              phases:
                - REQUEST
              clientId: test-client-123
      responses:
        '200':
          description: matcher registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: unique id assigned to this matcher
                  phases:
                    type: array
                    items:
                      type: string
                  clientId:
                    type: string
                    description: echoed back from the request
        '400':
          description: validation error (missing httpRequest, empty phases, unknown phase value, or missing/blank clientId)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /mockserver/breakpoint/matchers:
    get:
      tags:
        - control
      summary: list all registered breakpoint matchers
      description: >-
        Returns all currently registered breakpoint matchers. Each entry includes the matcher id,
        the httpRequest definition, the set of phases, and the clientId.
      responses:
        '200':
          description: list of registered matchers
          content:
            application/json:
              schema:
                type: object
                properties:
                  matchers:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        httpRequest:
                          type: object
                        phases:
                          type: array
                          items:
                            type: string
                        clientId:
                          type: string
                          description: callback WebSocket client id that owns this matcher (always present)
    put:
      tags:
        - control
      summary: list all registered breakpoint matchers (PUT variant)
      description: >-
        Same as GET /mockserver/breakpoint/matchers. The PUT variant exists for consistency with
        other control-plane endpoints that use PUT for idempotent queries.
      responses:
        '200':
          description: list of registered matchers
          content:
            application/json:
              schema:
                type: object
                properties:
                  matchers:
                    type: array
                    items:
                      type: object
  /mockserver/breakpoint/matcher/remove:
    put:
      tags:
        - control
      summary: remove a registered breakpoint matcher
      description: >-
        Removes a previously registered breakpoint matcher by id. Returns status "removed" on
        success or 404 if no matcher with the given id exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
                  description: the matcher id to remove
            example:
              id: 78fa44ff-5989-467a-ba44-ff5989667a71
      responses:
        '200':
          description: matcher removed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: removed
                  id:
                    type: string
        '404':
          description: no matcher found with the given id
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /mockserver/breakpoint/matcher/clear:
    put:
      tags:
        - control
      summary: remove all registered breakpoint matchers
      description: >-
        Removes all registered breakpoint matchers. After this call, no exchanges will be paused
        at breakpoints until new matchers are registered. Returns the number of matchers cleared.
      responses:
        '200':
          description: all matchers cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: cleared
                  count:
                    type: integer
                    description: number of matchers that were removed
  # REST resolution endpoints (/breakpoint, /breakpoint/continue|modify|abort,
  # /breakpoint/streams, /breakpoint/stream/{continue,modify,drop,inject,close})
  # have been removed — all breakpoint resolution is done over the callback WebSocket.
  /mockserver/chaosExperiment:
    put:
      tags:
        - chaos
      summary: start a scheduled multi-stage chaos experiment
      description: >-
        Starts a chaos experiment with an ordered sequence of stages, each applying service-scoped
        chaos profiles to one or more hosts for a specified duration. Stages progress automatically.
        Only one experiment may be active at a time; starting a new one stops the previous one.
        Safety limits: max 50 stages, max 24h per stage duration, auto-halt integration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - stages
              properties:
                name:
                  type: string
                  description: human-readable experiment name
                loop:
                  type: boolean
                  description: whether to loop back to stage 0 after the last stage completes (default false)
                stages:
                  type: array
                  description: ordered sequence of stages
                  items:
                    type: object
                    required:
                      - durationMillis
                      - profiles
                    properties:
                      durationMillis:
                        type: integer
                        description: how long this stage runs before advancing (max 86400000 = 24h)
                      profiles:
                        type: object
                        description: >-
                          map of host -> chaos profile to apply during this stage
                        additionalProperties:
                          $ref: "#/components/schemas/HttpChaosProfile"
            example:
              name: gradual-degradation
              stages:
                - durationMillis: 10000
                  profiles:
                    api.example.com:
                      errorStatus: 500
                      errorProbability: 0.1
                - durationMillis: 10000
                  profiles:
                    api.example.com:
                      errorStatus: 500
                      errorProbability: 0.5
      responses:
        '200':
          description: experiment started
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [started]
                  name:
                    type: string
        '400':
          description: invalid experiment definition (missing name, empty stages, invalid duration, etc.)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    get:
      tags:
        - chaos
      summary: get the status of the current chaos experiment
      description: >-
        Returns the current experiment status including name, running status
        (running/completed/halted_by_auto_halt/stopped), current stage index, total stages,
        elapsed/remaining time, loop iteration count, and the full experiment definition.
        Returns null/empty when no experiment is or was recently active.
      responses:
        '200':
          description: experiment status (or empty if none active)
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  status:
                    type: string
                    enum: [running, completed, halted_by_auto_halt, stopped]
                  currentStageIndex:
                    type: integer
                  totalStages:
                    type: integer
                  stageElapsedMillis:
                    type: integer
                  stageRemainingMillis:
                    type: integer
                  loopIteration:
                    type: integer
                  totalElapsedMillis:
                    type: integer
                  experiment:
                    type: object
                    description: the full experiment definition
    delete:
      tags:
        - chaos
      summary: stop the current chaos experiment
      description: >-
        Stops the current experiment and clears all chaos from the service registry.
        Idempotent — no-op if no experiment is running.
      responses:
        '200':
          description: experiment stopped (or no experiment was running)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [stopped]
  /mockserver/generateExpectation:
    put:
      tags:
        - expectation
      summary: generate expectation suggestion(s) from an unmatched request
      description: >-
        Generates one or more suggested expectations for an unmatched HttpRequest. When 'preview' is true
        (the default) the suggestions are only returned; when false they are also added. If an LLM backend
        is configured it is used, otherwise a simple template-based stub is generated.
      responses:
        '200':
          description: expectation suggestion(s) returned
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  suggestions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Expectation"
                  confidence:
                    type: number
                  preview:
                    type: boolean
                  explanation:
                    type: string
        '400':
          description: missing body, missing 'request' field, or failed to parse the request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - request
              properties:
                request:
                  $ref: "#/components/schemas/HttpRequest"
                preview:
                  type: boolean
                  default: true
                  description: when true (default) only return suggestions; when false also add them
                limit:
                  type: integer
                  default: 1
                  minimum: 1
                  maximum: 5
                  description: maximum number of suggestions to generate (1-5)
            example:
              request:
                method: POST
                path: /api/orders
              preview: true
              limit: 1
        description: the unmatched request to generate expectation(s) for
        required: true
  /mockserver/explainUnmatched:
    put:
      tags:
        - troubleshooting
      summary: explain why recent requests did not match any expectation
      description: >-
        Returns a diagnostic report for recently recorded unmatched requests, including the closest-matching
        expectations and the per-field differences that prevented a match. An optional 'limit' in the body
        bounds how many unmatched requests are analysed (default 10).
      responses:
        '200':
          description: unmatched-request explanation returned
          content:
            application/json:
              schema:
                type: object
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                limit:
                  type: integer
                  default: 10
                  description: maximum number of recent unmatched requests to analyse
            example:
              limit: 5
        description: optional limit on the number of unmatched requests to analyse
        required: false
  /mockserver/debugMismatch:
    put:
      tags:
        - troubleshooting
      summary: return per-expectation mismatch debug information for a request
      description: >-
        Evaluates the supplied HttpRequest against every active expectation and returns, for each, whether
        it matched and the per-field differences, plus the closest match. Only HttpRequest definitions are
        supported (not OpenAPI definitions).
      responses:
        '200':
          description: mismatch debug information returned
          content:
            application/json:
              schema:
                type: object
        '400':
          description: an OpenAPI definition was supplied instead of an HttpRequest, or the request could not be processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestDefinition"
            example:
              method: GET
              path: /api/unknown-endpoint
        description: the request to evaluate against all active expectations
        required: true
  /mockserver/pact:
    put:
      tags:
        - pact
      summary: export active expectations as a Pact contract
      description: >-
        Exports the current active expectations as a Pact consumer-driven contract (JSON). The optional
        'consumer' and 'provider' query parameters set the contract's consumer and provider names.
      parameters:
        - in: query
          name: consumer
          schema:
            type: string
          required: false
          description: consumer name to record in the exported Pact contract
        - in: query
          name: provider
          schema:
            type: string
          required: false
          description: provider name to record in the exported Pact contract
      responses:
        '200':
          description: Pact contract exported
          content:
            application/json:
              schema:
                type: object
                description: Pact consumer-driven contract document
        '400':
          description: failed to export the Pact contract
          content:
            text/plain:
              schema:
                type: string
  /mockserver/pact/verify:
    put:
      tags:
        - pact
      summary: verify active expectations against a Pact contract
      description: >-
        Verifies the supplied Pact contract (JSON) against the current expectations and returns the
        verification result. Returns 202 when verification passes and 406 when it fails.
      responses:
        '202':
          description: Pact verification passed
          content:
            application/json:
              schema:
                type: object
                description: Pact verification result
        '406':
          description: Pact verification failed
          content:
            application/json:
              schema:
                type: object
                description: Pact verification result describing the failures
        '400':
          description: empty or invalid Pact contract
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Pact contract document to verify against
            example:
              consumer:
                name: web-app
              provider:
                name: api-service
              interactions:
                - description: a health check request
                  request:
                    method: GET
                    path: /api/health
                  response:
                    status: 200
                    headers:
                      content-type: application/json
                    body:
                      status: ok
        description: the Pact contract to verify
        required: true
  /mockserver/wsdl:
    put:
      tags:
        - expectation
      summary: create expectations from a WSDL
      description: generates expectations from a WSDL document (the request body is the raw WSDL) and adds them
      responses:
        '201':
          description: expectations created from the WSDL
          content:
            application/json:
              schema:
                description: "list of upserted expectations"
                type: array
                additionalProperties: false
                items:
                  $ref: "#/components/schemas/Expectation"
        '400':
          description: invalid or unparseable WSDL document
          content:
            text/plain:
              schema:
                type: string
      requestBody:
        content:
          application/xml:
            schema:
              type: string
              description: raw WSDL document
            example: <?xml version="1.0" encoding="UTF-8"?><definitions xmlns="http://schemas.xmlsoap.org/wsdl/" xmlns:soap="http://schemas.xmlsoap.org/wsdl/soap/" xmlns:tns="http://example.com/greeting" xmlns:xsd="http://www.w3.org/2001/XMLSchema" name="GreetingService" targetNamespace="http://example.com/greeting"><types><xsd:schema targetNamespace="http://example.com/greeting"><xsd:element name="GreetRequest"><xsd:complexType><xsd:sequence><xsd:element name="name" type="xsd:string"/></xsd:sequence></xsd:complexType></xsd:element><xsd:element name="GreetResponse"><xsd:complexType><xsd:sequence><xsd:element name="greeting" type="xsd:string"/></xsd:sequence></xsd:complexType></xsd:element></xsd:schema></types><message name="GreetRequestMessage"><part name="parameters" element="tns:GreetRequest"/></message><message name="GreetResponseMessage"><part name="parameters" element="tns:GreetResponse"/></message><portType name="GreetingPortType"><operation name="Greet"><input message="tns:GreetRequestMessage"/><output message="tns:GreetResponseMessage"/></operation></portType><binding name="GreetingBinding" type="tns:GreetingPortType"><soap:binding style="document" transport="http://schemas.xmlsoap.org/soap/http"/><operation name="Greet"><soap:operation soapAction="http://example.com/greeting/Greet"/><input><soap:body use="literal"/></input><output><soap:body use="literal"/></output></operation></binding><service name="GreetingService"><port name="GreetingPort" binding="tns:GreetingBinding"><soap:address location="http://localhost:1080/ws/greeting"/></port></service></definitions>
        description: WSDL document to generate expectations from
        required: true
  /mockserver/graphql:
    put:
      tags:
        - expectation
      summary: create expectations from a GraphQL schema
      description: >-
        Generates expectations from a GraphQL schema (the request body is a GraphQL SDL document or an
        introspection JSON result) and adds them. One expectation is created per root operation type
        (query / mutation / subscription); each matches any operation of that kind and synthesizes a
        schema-valid response per request. The optional "path" query parameter overrides the default
        "/graphql" request path the generated expectations match.
      parameters:
        - in: query
          name: path
          required: false
          schema:
            type: string
          description: request path the generated GraphQL expectations match (default "/graphql")
      responses:
        '201':
          description: expectations created from the GraphQL schema
          content:
            application/json:
              schema:
                description: "list of upserted expectations"
                type: array
                additionalProperties: false
                items:
                  $ref: "#/components/schemas/Expectation"
        '400':
          description: invalid or unparseable GraphQL schema
          content:
            text/plain:
              schema:
                type: string
      requestBody:
        content:
          application/graphql:
            schema:
              type: string
              description: GraphQL SDL document or introspection JSON result
            example: "type Query { hello: String } type Mutation { ping: String }"
        description: GraphQL schema to generate expectations from
        required: true
  /mockserver/asyncapi/http:
    put:
      tags:
        - expectation
      summary: create HTTP expectations from an AsyncAPI spec
      description: >-
        Generates HTTP expectations from an AsyncAPI 2.x/3.x spec (JSON/YAML, or a {spec, channelPathPrefix}
        wrapper) so each channel's example message can be served over plain HTTP without a live broker. One
        GET expectation is created per channel returning that channel's schema-aware example payload. This is
        distinct from PUT /mockserver/asyncapi, which loads a spec into the broker-publishing mock. Requires
        the mockserver-async module on the classpath (501 otherwise).
      responses:
        '201':
          description: HTTP expectations created from the AsyncAPI spec
          content:
            application/json:
              schema:
                description: "list of upserted expectations"
                type: array
                additionalProperties: false
                items:
                  $ref: "#/components/schemas/Expectation"
        '400':
          description: missing or unparseable AsyncAPI spec
          content:
            application/json:
              schema:
                type: object
        '501':
          description: the mockserver-async module is not on the classpath
          content:
            application/json:
              schema:
                type: object
      requestBody:
        content:
          application/json:
            schema:
              type: string
              description: AsyncAPI spec (JSON/YAML) or a {spec, channelPathPrefix} wrapper
        description: AsyncAPI spec to import as HTTP expectations
        required: true
  /mockserver/grpc/services:
    put:
      tags:
        - grpc
      summary: list loaded gRPC services
      description: >-
        Returns the gRPC services available from the loaded proto descriptor set, each with its methods
        and their input/output types and streaming flags.
      responses:
        '200':
          description: loaded gRPC services returned
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  properties:
                    name:
                      type: string
                    methods:
                      type: array
                      items:
                        type: object
                        additionalProperties: false
                        properties:
                          name:
                            type: string
                          inputType:
                            type: string
                          outputType:
                            type: string
                          clientStreaming:
                            type: boolean
                          serverStreaming:
                            type: boolean
        '400':
          description: failed to list gRPC services
          content:
            text/plain:
              schema:
                type: string
  /mockserver/grpc/clear:
    put:
      tags:
        - grpc
      summary: reset the gRPC descriptor store
      description: clears all loaded gRPC proto descriptors and the services derived from them
      responses:
        '200':
          description: gRPC descriptor store reset
  /mockserver/stop:
    put:
      tags:
        - control
      summary: stop running process
      description: only supported on Netty version
      responses:
        '200':
          description: MockServer process is stopping
  /mockserver/loadScenario:
    put:
      tags:
        - loadgen
      summary: load (register) a load scenario into the registry
      description: >-
        Loads (registers) an API load scenario into the named registry under its "name" (the unique
        registry key). Loading does NOT run the scenario — it is staged in the LOADED state, ready to be
        triggered by PUT /mockserver/loadScenario/start. Loading the same name replaces the prior
        definition. A scenario is an ordered list of templated request steps driven through a sequence of
        stages (a load profile): a stage holds/ramps virtual users (VU, closed model), holds/ramps an
        arrival rate in iterations/second (RATE, open model), or pauses; an optional startDelayMillis
        defers the start after a trigger. Loading is allowed even when loadGenerationEnabled is false
        (no traffic is generated). Hard caps validated at load time: max 50 virtual users, max 5000
        iterations/second, max 20 stages, max 50 steps, max 1h total duration.
      responses:
        '200':
          description: load scenario loaded (registered)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: string
                    enum: [loaded]
                  name:
                    type: string
                  state:
                    type: string
                    enum: [LOADED, PENDING, RUNNING, COMPLETED, STOPPED]
        '400':
          description: invalid scenario definition or a configured cap exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoadScenario"
            example:
              name: checkout-load
              templateType: VELOCITY
              maxRequests: 5000
              startDelayMillis: 0
              profile:
                stages:
                  - type: VU
                    startVus: 1
                    endVus: 10
                    durationMillis: 30000
                    curve: LINEAR
                  - type: VU
                    vus: 10
                    durationMillis: 60000
              steps:
                - request:
                    method: GET
                    path: /api/item/$iteration.index
                    headers:
                      Host:
                        - target.svc:8080
                    socketAddress:
                      host: target.svc
                      port: 8080
                      scheme: HTTP
                  thinkTime:
                    timeUnit: MILLISECONDS
                    value: 20
        description: the load scenario to load (register)
        required: true
    get:
      tags:
        - loadgen
      summary: list all registered load scenarios
      description: >-
        Lists every registered load scenario with its lifecycle state (LOADED / PENDING / RUNNING /
        COMPLETED / STOPPED), startDelayMillis, full definition, and — when active or recently run — the
        live status fields (stage, virtual users, request counts, latency percentiles, run id, timestamps).
      responses:
        '200':
          description: registered load scenarios listed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  scenarios:
                    type: array
                    items:
                      $ref: "#/components/schemas/LoadScenarioListEntry"
        '400':
          description: failed to list load scenarios
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    delete:
      tags:
        - loadgen
      summary: clear the load scenario registry
      description: Removes ALL registered load scenarios, stopping any that are running. Idempotent.
      responses:
        '200':
          description: load scenario registry cleared
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: string
                    enum: [cleared]
        '400':
          description: failed to clear load scenarios
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /mockserver/loadScenario/{name}:
    parameters:
      - name: name
        in: path
        required: true
        description: the registered load scenario name
        schema:
          type: string
    get:
      tags:
        - loadgen
      summary: retrieve one registered load scenario
      description: Returns a single registered load scenario (definition + state + live/terminal status). 404 if not registered.
      responses:
        '200':
          description: load scenario returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoadScenarioListEntry"
        '404':
          description: no load scenario registered under that name
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    delete:
      tags:
        - loadgen
      summary: remove one registered load scenario
      description: Removes a single load scenario from the registry, stopping it first if it is running.
      responses:
        '200':
          description: load scenario removed (or absent)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: string
                    enum: [deleted, absent]
                  name:
                    type: string
        '400':
          description: failed to delete load scenario
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /mockserver/loadScenario/{name}/report:
    parameters:
      - name: name
        in: path
        required: true
        description: the load scenario name
        schema:
          type: string
      - name: format
        in: query
        required: false
        description: >-
          report format. Omit (or any value other than "junit") for the JSON report;
          "junit" returns a JUnit-XML <testsuite> (Content-Type application/xml) so a
          load run becomes a first-class CI test artifact.
        schema:
          type: string
          enum: [junit]
    get:
      tags:
        - loadgen
      summary: end-of-run summary report for a load scenario run
      description: >-
        Returns an end-of-run summary report derived from the run's status snapshot — the live
        snapshot while running, or the retained terminal snapshot once finished. The default JSON
        form carries counts, latency percentiles, the threshold verdict and per-threshold results.
        With ?format=junit the same data is rendered as a JUnit-XML <testsuite> (one <testcase> per
        threshold, a <failure> per breach, plus a "run completed" testcase) so CI consumers render
        per-threshold pass/fail. 404 if the scenario never ran.
      responses:
        '200':
          description: report returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoadScenarioReport"
            application/xml:
              schema:
                type: string
                description: JUnit-XML <testsuite> document (returned when format=junit)
        '404':
          description: no load scenario run for that name
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /mockserver/loadScenario/generateFromOpenAPI:
    put:
      tags:
        - loadgen
      summary: seed a load scenario from an OpenAPI specification
      description: >-
        Generates an editable load scenario from an OpenAPI spec and loads (registers) it into the
        registry under "name" in the LOADED state — exactly like PUT /mockserver/loadScenario, it
        generates no traffic and is allowed even when loadGenerationEnabled is false. One step is
        produced per OpenAPI operation (in a stable path-then-method order), each with the operation's
        method and server-prefixed path, a representative request-body example, and a Content-Type
        header. The spec is accepted identically to PUT /mockserver/openapi/expectation — an inline
        JSON/YAML payload, a URL, or a file/classpath reference. Target precedence for where each request
        is sent (carried as the request's Host header and secure flag): an explicit "target" wins, else
        the spec's servers[0] URL, else the request is left path-only for the operator to edit. When no
        "profile" is supplied a conservative default is applied (one short constant-VU stage) so the
        scenario is immediately runnable yet safe — the operator edits it before scaling up. The
        generated scenario is returned so a client/UI can show and edit it before triggering a run.
      responses:
        '200':
          description: load scenario generated and loaded (registered)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: string
                    enum: [loaded]
                  name:
                    type: string
                  state:
                    type: string
                    enum: [LOADED, PENDING, RUNNING, COMPLETED, STOPPED]
                  scenario:
                    $ref: "#/components/schemas/LoadScenario"
        '400':
          description: missing name/spec, an unparseable spec, a spec with no operations, or a generated scenario that fails validation
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - specUrlOrPayload
              properties:
                name:
                  type: string
                  description: the generated scenario name (the unique registry key)
                specUrlOrPayload:
                  type: string
                  description: the OpenAPI spec as an inline JSON/YAML payload, a URL, or a file/classpath reference
                target:
                  type: object
                  description: explicit network target for every generated step (overrides the spec's servers[0])
                  properties:
                    host:
                      type: string
                    port:
                      type: integer
                    scheme:
                      type: string
                      enum: [http, https]
                profile:
                  $ref: "#/components/schemas/LoadProfile"
            example:
              name: petstore-load
              specUrlOrPayload: "https://raw.githubusercontent.com/OAI/OpenAPI-Specification/master/examples/v3.0/petstore.yaml"
              target:
                host: petstore.svc
                port: 8080
                scheme: http
        description: the scenario name plus the OpenAPI spec (with optional target and profile)
        required: true
  /mockserver/loadScenario/generateFromRecording:
    put:
      tags:
        - loadgen
      summary: seed a load scenario from recorded proxy traffic
      description: >-
        Generates an editable load scenario from traffic previously recorded by MockServer in
        proxy/recording mode (the requests held by the event log) and loads (registers) it into the
        registry under "name" in the LOADED state — exactly like PUT /mockserver/loadScenario, it
        generates no traffic and is allowed even when loadGenerationEnabled is false. Two modes control
        how recorded requests become steps. VERBATIM (the default) emits one step per recorded request,
        in recorded order, preserving the concrete path, body and headers — with an optional "maxSteps"
        cap. TEMPLATIZED deduplicates recorded requests by (method, templatised-path) — id-shaped path
        segments such as /orders/123 collapse to /orders/{id} — keeping one representative example per
        unique route, ordered by descending hit frequency (most-hit routes first); no per-step weight is
        added. An optional "requestFilter" (an HttpRequest matcher) selects which recorded requests to
        include; absent means all recorded requests. An optional "target" is applied to every step
        (overriding each recorded request's own Host/secure routing); absent leaves each recorded
        request's routing untouched. When no "profile" is supplied a conservative default is applied (one
        short constant-VU stage) so the scenario is immediately runnable yet safe — the operator edits it
        before scaling up. The generated scenario is returned so a client/UI can show and edit it before
        triggering a run.
      responses:
        '200':
          description: load scenario generated and loaded (registered)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: string
                    enum: [loaded]
                  name:
                    type: string
                  state:
                    type: string
                    enum: [LOADED, PENDING, RUNNING, COMPLETED, STOPPED]
                  scenario:
                    $ref: "#/components/schemas/LoadScenario"
        '400':
          description: missing name, no recorded requests to convert, an invalid mode, or a generated scenario that fails validation
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: the generated scenario name (the unique registry key)
                mode:
                  type: string
                  enum: [VERBATIM, TEMPLATIZED]
                  default: VERBATIM
                  description: VERBATIM = one step per recorded request; TEMPLATIZED = one step per unique (method, templatised-path) route, ordered by descending frequency
                requestFilter:
                  $ref: "#/components/schemas/HttpRequest"
                maxSteps:
                  type: integer
                  description: optional cap on the number of VERBATIM steps (keeps the first N recorded requests)
                target:
                  type: object
                  description: explicit network target applied to every generated step (overrides each recorded request's own Host/secure routing)
                  properties:
                    host:
                      type: string
                    port:
                      type: integer
                    scheme:
                      type: string
                      enum: [http, https]
                profile:
                  $ref: "#/components/schemas/LoadProfile"
            example:
              name: replay-prod-traffic
              mode: TEMPLATIZED
              target:
                host: staging.svc
                port: 8080
                scheme: http
        description: the scenario name plus optional mode, requestFilter, maxSteps, target and profile
        required: true
  /mockserver/loadScenario/start:
    put:
      tags:
        - loadgen
      summary: trigger registered load scenario(s) to run
      description: >-
        Triggers one or more registered load scenarios to start running concurrently. Each gets a fresh
        run id and honours its own startDelayMillis (a positive delay → the scenario is PENDING until the
        delay elapses, then RUNNING). Requires loadGenerationEnabled=true (else 403). 404 if a name is not
        registered. Rejected with 400 if it would exceed loadGenerationMaxConcurrentScenarios (default 10).
        Re-triggering an already-active name replaces that run.
      responses:
        '200':
          description: load scenario(s) triggered
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: string
                    enum: [started]
                  started:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        state:
                          type: string
                          enum: [PENDING, RUNNING]
        '400':
          description: bad request (no names given, or the concurrent-scenario cap would be exceeded)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '403':
          description: load generation not enabled (set loadGenerationEnabled=true)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '404':
          description: one of the named scenarios is not registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                names:
                  type: array
                  items:
                    type: string
                name:
                  type: string
            examples:
              multiple:
                value:
                  names: [checkout-load, background-poller]
              single:
                value:
                  name: checkout-load
        description: the registered scenario name(s) to trigger
        required: true
  /mockserver/loadScenario/stop:
    put:
      tags:
        - loadgen
      summary: stop running load scenario(s)
      description: >-
        Stops one or more running load scenarios. Body is {"names":[...]}, {"all":true}, or an empty body
        (stop all running). Stopped scenarios stay registered (state STOPPED) and can be re-triggered.
      responses:
        '200':
          description: load scenario(s) stopped
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: string
                    enum: [stopped]
                  stopped:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        state:
                          type: string
                          enum: [STOPPED]
        '400':
          description: failed to stop load scenario(s)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                names:
                  type: array
                  items:
                    type: string
                all:
                  type: boolean
            examples:
              byName:
                value:
                  names: [checkout-load]
              all:
                value:
                  all: true
  /mockserver/verifySLO:
    put:
      tags:
        - slo
      summary: verify a service-level objective over a window
      description: >-
        Evaluates a named set of objectives (latency percentiles, error rate) over a time window against
        the recorded forward-path SLI samples and returns a PASS / FAIL / INCONCLUSIVE verdict. The HTTP
        status encodes the verdict so a CI or chaos gate can assert on the status code alone: 200 when the
        verdict is PASS or INCONCLUSIVE, 406 when it is FAIL. A criteria PASSes only when all objectives
        hold (logical AND); it is INCONCLUSIVE when an indicator cannot be computed or the window holds
        fewer than minimumSampleCount samples. Off by default — returns 400 until sloTrackingEnabled=true.
      responses:
        '200':
          description: verdict is PASS or INCONCLUSIVE
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SloVerdict"
        '406':
          description: verdict is FAIL (one or more objectives did not hold)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SloVerdict"
        '400':
          description: malformed criteria, or SLO tracking is disabled (sloTrackingEnabled=false)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SloCriteria"
            example:
              name: checkout-slo
              window:
                type: LOOKBACK
                lookbackMillis: 60000
              minimumSampleCount: 20
              upstreamHosts:
                - payments.svc
              objectives:
                - sli: LATENCY_P95
                  comparator: LESS_THAN
                  threshold: 250.0
                  scope: FORWARD
                - sli: ERROR_RATE
                  comparator: LESS_THAN_OR_EQUAL
                  threshold: 0.01
        description: the service-level objective criteria to evaluate
        required: true
  /mockserver/preemption:
    put:
      tags:
        - chaos
      summary: cordon and drain the server (preemption simulation)
      description: >-
        Simulates a connection-lifecycle preemption (e.g. a Kubernetes node drain or spot reclamation).
        While cordoned, new exchanges are signalled to back off — by a 503 + Connection: close, an HTTP/2
        GOAWAY frame, or both — while in-flight requests are allowed to drain. The simulation is server-scoped
        and does not stop the JVM. An empty body uses defaults (mode "both", drainMillis from stopDrainMillis,
        no TTL). drainMillis and ttlMillis are clamped to preemptionSimulationMaxDrainMillis.
      responses:
        '200':
          description: preemption simulation started or replaced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreemptionStatus"
        '400':
          description: invalid preemption request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreemptionRequest"
            example:
              mode: both
              drainMillis: 10000
              ttlMillis: 60000
              lastStreamId: 3
        description: preemption simulation parameters (all fields optional)
        required: false
    get:
      tags:
        - chaos
      summary: retrieve the current preemption status
      description: >-
        Returns the current cordon/drain status: state (inactive / draining / drained), the number of
        in-flight requests, the remaining drain window in milliseconds and the active signalling mode.
      responses:
        '200':
          description: preemption status returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreemptionStatus"
    delete:
      tags:
        - chaos
      summary: uncordon the server (clear preemption)
      description: >-
        Explicitly clears any active preemption simulation, returning the server to normal operation.
        Idempotent — returns 200 whether or not a simulation was active.
      responses:
        '200':
          description: preemption cleared
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  state:
                    type: string
                    enum: [inactive]
  /mockserver/chaosExperiment/profiles:
    get:
      tags:
        - chaos
      summary: list saved chaos profile names
      description: returns the names of all saved chaos experiment profiles, sorted ascending
      responses:
        '200':
          description: saved profile names returned
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  profiles:
                    type: array
                    items:
                      type: string
        '400':
          description: failed to list saved profiles
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  '/mockserver/chaosExperiment/profiles/{name}':
    put:
      tags:
        - chaos
      summary: save a chaos experiment profile
      description: >-
        Saves a chaos experiment definition (the same body shape as PUT /mockserver/chaosExperiment) under
        the given name so it can be applied later with POST /mockserver/chaosExperiment/apply/{name}. The
        name in the path is authoritative; any name field in the body is ignored. The name must be 1-128
        characters of letters, digits, space, dot, underscore or hyphen with no leading/trailing space.
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
          description: the profile name to save under
      responses:
        '200':
          description: profile saved
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: string
                    enum: [saved]
                  name:
                    type: string
        '400':
          description: missing body, invalid name, or invalid experiment definition
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChaosExperiment"
            example:
              stages:
                - durationMillis: 30000
                  profiles:
                    payments.svc:
                      errorStatus: 503
                      errorProbability: 0.5
        description: chaos experiment definition to save
        required: true
    get:
      tags:
        - chaos
      summary: retrieve a saved chaos profile
      description: returns the full saved chaos experiment definition stored under the given name
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
          description: the profile name
      responses:
        '200':
          description: saved profile returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChaosExperiment"
        '404':
          description: no chaos profile with the given name
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    delete:
      tags:
        - chaos
      summary: delete a saved chaos profile
      description: >-
        Removes the saved chaos profile with the given name. Idempotent — returns 200 with status "deleted"
        when the profile existed, or "absent" when it did not.
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
          description: the profile name to delete
      responses:
        '200':
          description: deletion processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: string
                    enum: [deleted, absent]
                  name:
                    type: string
  '/mockserver/chaosExperiment/apply/{name}':
    post:
      tags:
        - chaos
      summary: apply a saved chaos profile
      description: >-
        Starts the chaos experiment previously saved under the given name (as if its definition had been
        sent to PUT /mockserver/chaosExperiment). The request body is ignored.
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
          description: the saved profile name to apply
      responses:
        '200':
          description: saved profile applied (experiment started)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: string
                    enum: [started]
                  name:
                    type: string
                  stages:
                    type: integer
                  loop:
                    type: boolean
        '400':
          description: failed to apply the saved profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '404':
          description: no chaos profile with the given name
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /mockserver/contractTest:
    put:
      tags:
        - contract
      summary: run an OpenAPI spec as a contract test against a live service
      description: >-
        Runs each operation of an OpenAPI specification against a live service and validates that the
        actual responses conform to the spec. Supply the spec as a URL, file path or inline JSON/YAML
        ("spec", or its alias "specUrlOrPayload"), the base URL of the service under test ("baseUrl"),
        and optionally a single "operationId" to restrict the run. The target host is subject to the SSRF
        policy (forwardProxyBlockPrivateNetworks). Returns a per-operation pass/fail report.
      responses:
        '200':
          description: contract test completed (inspect allPassed and per-operation results)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractTestReport"
        '400':
          description: missing/blank spec or baseUrl, invalid baseUrl, or an error running the contract test
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '403':
          description: contract test blocked by SSRF policy (target is a private/loopback/metadata address)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '501':
          description: contract testing not available (no HTTP client wired)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractTestRequest"
            example:
              spec: https://petstore.swagger.io/v2/swagger.json
              baseUrl: http://localhost:8080
              operationId: listPets
        description: the OpenAPI spec and live-service base URL to contract-test
        required: true
components:
  schemas:
    ScenarioError:
      description: "scenario request error"
      type: object
      additionalProperties: false
      properties:
        error:
          type: string
    Expectations:
      description: "list of expectations"
      oneOf:
        - $ref: "#/components/schemas/Expectation"
        - type: array
          additionalProperties: false
          items:
            $ref: "#/components/schemas/Expectation"
    Expectation:
      description: "expectation"
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        priority:
          type: integer
        rateLimit:
          $ref: "#/components/schemas/RateLimit"
        httpRequest:
          $ref: "#/components/schemas/RequestDefinition"
        httpResponse:
          $ref: "#/components/schemas/HttpResponse"
        httpResponseTemplate:
          $ref: "#/components/schemas/HttpTemplate"
        httpResponseClassCallback:
          $ref: "#/components/schemas/HttpClassCallback"
        httpResponseObjectCallback:
          $ref: "#/components/schemas/HttpObjectCallback"
        httpForward:
          $ref: "#/components/schemas/HttpForward"
        httpForwardTemplate:
          $ref: "#/components/schemas/HttpTemplate"
        httpForwardClassCallback:
          $ref: "#/components/schemas/HttpClassCallback"
        httpForwardObjectCallback:
          $ref: "#/components/schemas/HttpObjectCallback"
        httpOverrideForwardedRequest:
          $ref: "#/components/schemas/HttpOverrideForwardedRequest"
        httpError:
          $ref: "#/components/schemas/HttpError"
        times:
          $ref: "#/components/schemas/Times"
        timeToLive:
          $ref: "#/components/schemas/TimeToLive"
      oneOf:
        - required:
            - httpResponse
        - required:
            - httpResponseTemplate
        - required:
            - httpResponseClassCallback
        - required:
            - httpResponseObjectCallback
        - required:
            - httpForward
        - required:
            - httpForwardTemplate
        - required:
            - httpForwardClassCallback
        - required:
            - httpForwardObjectCallback
        - required:
            - httpOverrideForwardedRequest
        - required:
            - httpError
    ExpectationId:
      description: "pointer to existing expectation"
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
      required:
        - id
    OpenAPIExpectations:
      description: "list of open api expectations"
      oneOf:
        - $ref: "#/components/schemas/OpenAPIExpectation"
        - type: array
          additionalProperties: false
          items:
            $ref: "#/components/schemas/OpenAPIExpectation"
    OpenAPIExpectation:
      description: "open api or swagger expectation"
      type: object
      additionalProperties: false
      properties:
        specUrlOrPayload:
          anyOf:
            - type: string
            - type: object
        operationsAndResponses:
          type: object
          additionalProperties:
            type: string
      required:
        - specUrlOrPayload
    RequestDefinition:
      description: "request definition"
      oneOf:
        - $ref: "#/components/schemas/HttpRequest"
        - $ref: "#/components/schemas/OpenAPIDefinition"
        - $ref: "#/components/schemas/ConditionalRequestDefinition"
    HttpRequest:
      description: "request properties matcher"
      type: object
      additionalProperties: false
      properties:
        secure:
          type: boolean
        keepAlive:
          type: boolean
        method:
          $ref: "#/components/schemas/StringOrJsonSchema"
        path:
          $ref: "#/components/schemas/StringOrJsonSchema"
        pathParameters:
          $ref: "#/components/schemas/KeyToMultiValue"
        queryStringParameters:
          $ref: "#/components/schemas/KeyToMultiValue"
        body:
          $ref: "#/components/schemas/Body"
        headers:
          $ref: "#/components/schemas/KeyToMultiValue"
        cookies:
          $ref: "#/components/schemas/KeyToValue"
        socketAddress:
          $ref: "#/components/schemas/SocketAddress"
        protocol:
          $ref: "#/components/schemas/Protocol"
    OpenAPIDefinition:
      description: "open api or swagger request matcher"
      type: object
      additionalProperties: false
      properties:
        specUrlOrPayload:
          type: string
        operationId:
          type: string
    ConditionalRequestDefinition:
      description: "conditional (if-then-else) request matcher: if the 'if' guard matches the request then the 'then' branch is required, otherwise the 'else' branch is required (when 'else' is omitted the expectation matches whenever the guard is false)"
      type: object
      additionalProperties: false
      required:
        - if
      properties:
        not:
          type: boolean
        if:
          $ref: "#/components/schemas/RequestDefinition"
        then:
          $ref: "#/components/schemas/RequestDefinition"
        else:
          $ref: "#/components/schemas/RequestDefinition"
    HttpResponse:
      description: "response to return"
      type: object
      additionalProperties: false
      properties:
        delay:
          $ref: "#/components/schemas/Delay"
        body:
          $ref: "#/components/schemas/BodyWithContentType"
        cookies:
          $ref: "#/components/schemas/KeyToValue"
        connectionOptions:
          $ref: "#/components/schemas/ConnectionOptions"
        headers:
          $ref: "#/components/schemas/KeyToMultiValue"
        trailers:
          $ref: "#/components/schemas/KeyToMultiValue"
        statusCode:
          type: integer
        reasonPhrase:
          type: string
        recoverAfter:
          $ref: "#/components/schemas/RecoverAfter"
    HttpTemplate:
      description: "template to generate response / request"
      type: object
      additionalProperties: false
      properties:
        delay:
          $ref: "#/components/schemas/Delay"
        templateType:
          enum:
            - VELOCITY
            - JAVASCRIPT
            - MUSTACHE
        template:
          type: string
        templateFile:
          type: string
    HttpForward:
      description: "host and port to forward to"
      type: object
      additionalProperties: false
      properties:
        delay:
          $ref: "#/components/schemas/Delay"
        host:
          type: string
        port:
          type: integer
        scheme:
          enum:
            - HTTP
            - HTTPS
    HttpClassCallback:
      description: "class callback"
      type: object
      additionalProperties: false
      properties:
        delay:
          $ref: "#/components/schemas/Delay"
        callbackClass:
          type: string
    HttpObjectCallback:
      description: "object / method callback"
      type: object
      additionalProperties: false
      properties:
        delay:
          $ref: "#/components/schemas/Delay"
        clientId:
          type: string
        responseCallback:
          type: boolean
    HttpOverrideForwardedRequest:
      description: "override forwarded request"
      oneOf:
        - type: object
          additionalProperties: false
          properties:
            delay:
              "$ref": "#/components/schemas/Delay"
            requestOverride:
              "$ref": "#/components/schemas/HttpRequest"
            requestModifier:
              type: object
              additionalProperties: false
              properties:
                path:
                  type: object
                  additionalProperties: false
                  properties:
                    regex:
                      type: string
                    substitution:
                      type: string
                queryStringParameters:
                  type: object
                  additionalProperties: false
                  properties:
                    add:
                      "$ref": "#/components/schemas/KeyToMultiValue"
                    replace:
                      "$ref": "#/components/schemas/KeyToMultiValue"
                    remove:
                      type: array
                      additionalProperties: false
                      items:
                        type: string
                headers:
                  type: object
                  additionalProperties: false
                  properties:
                    add:
                      "$ref": "#/components/schemas/KeyToMultiValue"
                    replace:
                      "$ref": "#/components/schemas/KeyToMultiValue"
                    remove:
                      type: array
                      additionalProperties: false
                      items:
                        type: string
                cookies:
                  type: object
                  additionalProperties: false
                  properties:
                    add:
                      "$ref": "#/components/schemas/KeyToValue"
                    replace:
                      "$ref": "#/components/schemas/KeyToValue"
                    remove:
                      type: array
                      additionalProperties: false
                      items:
                        type: string
            responseOverride:
              "$ref": "#/components/schemas/HttpResponse"
            responseModifier:
              type: object
              additionalProperties: false
              properties:
                headers:
                  type: object
                  additionalProperties: false
                  properties:
                    add:
                      "$ref": "#/components/schemas/KeyToMultiValue"
                    replace:
                      "$ref": "#/components/schemas/KeyToMultiValue"
                    remove:
                      type: array
                      additionalProperties: false
                      items:
                        type: string
                cookies:
                  type: object
                  additionalProperties: false
                  properties:
                    add:
                      "$ref": "#/components/schemas/KeyToValue"
                    replace:
                      "$ref": "#/components/schemas/KeyToValue"
                    remove:
                      type: array
                      additionalProperties: false
                      items:
                        type: string
                condition:
                  description: "apply this modifier only when the in-flight response (and optionally the original request) match"
                  type: object
                  additionalProperties: false
                  properties:
                    statusCode:
                      type: integer
                      description: "response status code must equal this value"
                    statusCodeRange:
                      type: string
                      description: "response status code must fall in this class range, e.g. 2xx or 5xx"
                    responseHasHeader:
                      type: string
                      description: "response must carry a header with this name (any value, case-insensitive)"
                    requestHasHeader:
                      type: string
                      description: "request must carry a header with this name (any value, case-insensitive)"
                modifiers:
                  description: "ordered chain of modifiers, each applied in turn so a later modifier sees the earlier one's output"
                  type: array
                  additionalProperties: false
                  items:
                    "$ref": "#/components/schemas/ResponseModifier"
                jsonPatch:
                  description: "RFC 6902 JSON Patch (array of add/remove/replace/move/copy/test operations) applied to a forwarded response body when that body is valid JSON; applied before jsonMergePatch; a non-JSON body or a failed operation leaves the body unchanged"
                  type: array
                jsonMergePatch:
                  description: "RFC 7386 JSON Merge Patch applied to a forwarded response body when that body is valid JSON; members overwrite, or when null delete, the corresponding body members; a non-JSON body leaves the body unchanged"
                  type: object
        - type: object
          additionalProperties: false
          properties:
            delay:
              "$ref": "#/components/schemas/Delay"
            httpRequest:
              "$ref": "#/components/schemas/HttpRequest"
            httpResponse:
              "$ref": "#/components/schemas/HttpResponse"
    HttpError:
      description: "error behaviour"
      type: object
      additionalProperties: false
      properties:
        delay:
          $ref: "#/components/schemas/Delay"
        dropConnection:
          type: boolean
          description: "drop the connection; ignored when streamError is set (streamError takes precedence)"
        responseBytes:
          type: string
        streamError:
          type: integer
          format: int64
          description: "reset the matched request stream with this error code (HTTP/2 RST_STREAM / HTTP/3 RESET_STREAM) instead of returning a response; HTTP/1.1 has no stream concept so this falls back to dropping the connection"
    Times:
      description: "number of responses"
      type: object
      additionalProperties: false
      properties:
        remainingTimes:
          type: integer
        unlimited:
          type: boolean
    TimeToLive:
      description: "time expectation is valid for"
      type: object
      additionalProperties: false
      properties:
        timeUnit:
          enum:
            - DAYS
            - HOURS
            - MINUTES
            - SECONDS
            - MILLISECONDS
            - MICROSECONDS
            - NANOSECONDS
        timeToLive:
          type: integer
        unlimited:
          type: boolean
    ResponseModifier:
      description: "a response modifier; may itself be conditional and/or wrap a further chain"
      type: object
      additionalProperties: false
      properties:
        headers:
          type: object
          additionalProperties: false
          properties:
            add:
              "$ref": "#/components/schemas/KeyToMultiValue"
            replace:
              "$ref": "#/components/schemas/KeyToMultiValue"
            remove:
              type: array
              additionalProperties: false
              items:
                type: string
        cookies:
          type: object
          additionalProperties: false
          properties:
            add:
              "$ref": "#/components/schemas/KeyToValue"
            replace:
              "$ref": "#/components/schemas/KeyToValue"
            remove:
              type: array
              additionalProperties: false
              items:
                type: string
        condition:
          description: "apply this modifier only when the in-flight response (and optionally the original request) match"
          type: object
          additionalProperties: false
          properties:
            statusCode:
              type: integer
              description: "response status code must equal this value"
            statusCodeRange:
              type: string
              description: "response status code must fall in this class range, e.g. 2xx or 5xx"
            responseHasHeader:
              type: string
              description: "response must carry a header with this name (any value, case-insensitive)"
            requestHasHeader:
              type: string
              description: "request must carry a header with this name (any value, case-insensitive)"
        modifiers:
          description: "ordered chain of modifiers, each applied in turn so a later modifier sees the earlier one's output"
          type: array
          additionalProperties: false
          items:
            "$ref": "#/components/schemas/ResponseModifier"
        jsonPatch:
          description: "RFC 6902 JSON Patch (array of add/remove/replace/move/copy/test operations) applied to a forwarded response body when that body is valid JSON; applied before jsonMergePatch; a non-JSON body or a failed operation leaves the body unchanged"
          type: array
        jsonMergePatch:
          description: "RFC 7386 JSON Merge Patch applied to a forwarded response body when that body is valid JSON; members overwrite, or when null delete, the corresponding body members; a non-JSON body leaves the body unchanged"
          type: object
    KeyToMultiValue:
      oneOf:
        - type: array
          additionalProperties: false
          items:
            type: object
            additionalProperties: false
            properties:
              name:
                type: string
              values:
                type: array
                additionalProperties: false
                items:
                  type: string
        - type: object
          additionalProperties: true
          properties:
            keyMatchStyle:
              type: string
              enum:
                - MATCHING_KEY
                - SUB_SET
              default: SUB_SET
          # patternProperties:
          #   "^(?!keyMatchStyle)\\S+$":
          #     oneOf:
          #     - type: array
          #       additionalProperties: false
          #       items:
          #         $ref: "#/components/schemas/StringOrJsonSchema"
          #     - type: object
          #       additionalProperties: false
          #       properties:
          #         parameterStyle:
          #           type: string
          #           enum:
          #           - SIMPLE
          #           - SIMPLE_EXPLODED
          #           - LABEL
          #           - LABEL_EXPLODED
          #           - MATRIX
          #           - MATRIX_EXPLODED
          #           - FORM_EXPLODED
          #           - FORM
          #           - SPACE_DELIMITED_EXPLODED
          #           - SPACE_DELIMITED
          #           - PIPE_DELIMITED_EXPLODED
          #           - PIPE_DELIMITED
          #           - DEEP_OBJECT
          #           default: ''
          #         values:
          #           type: array
          #           additionalProperties: false
          #           items:
          #             $ref: "#/components/schemas/StringOrJsonSchema"
    KeyToValue:
      oneOf:
        - type: array
          additionalProperties: false
          items:
            type: object
            properties:
              name:
                type: string
              value:
                type: string
        - type: object
          additionalProperties: true
          # patternProperties:
          #   "^\\S+$":
          #     $ref: "#/components/schemas/StringOrJsonSchema"
    StringOrJsonSchema:
      description: "string value that can be support nottable, optional or a json schema"
      oneOf:
        - type: string
        - type: object
          additionalProperties: false
          properties:
            not:
              type: boolean
            optional:
              type: boolean
            value:
              type: string
            schema:
              $ref: http://json-schema.org/draft-04/schema
            parameterStyle:
              type: string
              enum:
                - SIMPLE
                - SIMPLE_EXPLODED
                - LABEL
                - LABEL_EXPLODED
                - MATRIX
                - MATRIX_EXPLODED
                - FORM_EXPLODED
                - FORM
                - SPACE_DELIMITED_EXPLODED
                - SPACE_DELIMITED
                - PIPE_DELIMITED_EXPLODED
                - PIPE_DELIMITED
                - DEEP_OBJECT
    SocketAddress:
      description: "remote address to send request to, only used for request overrides"
      type: object
      additionalProperties: false
      properties:
        host:
          type: string
        port:
          type: integer
        scheme:
          enum:
            - HTTP
            - HTTPS
    Protocol:
      description: "protocol matcher"
      enum:
        - HTTP_1_1
        - HTTP_2
        - HTTP_3
    Body:
      description: "request body matcher"
      anyOf:
        - type: object
          description: "binary body matcher"
          additionalProperties: false
          properties:
            not:
              type: boolean
            type:
              enum:
                - BINARY
            base64Bytes:
              type: string
            contentType:
              type: string
        - type: object
          description: "json body matcher"
          additionalProperties: false
          properties:
            not:
              type: boolean
            type:
              enum:
                - JSON
            json:
              type: string
            contentType:
              type: string
            matchType:
              enum:
                - STRICT
                - ONLY_MATCHING_FIELDS
            matchNumbersAsStrings:
              type: boolean
        - type: object
          description: "json matching fields body matcher"
          additionalProperties: true
        - type: object
          description: "json schema body matcher"
          additionalProperties: false
          properties:
            not:
              type: boolean
            type:
              enum:
                - JSON_SCHEMA
            jsonSchema:
              $ref: http://json-schema.org/draft-04/schema
        - type: object
          description: "JSON path body matcher"
          additionalProperties: false
          properties:
            not:
              type: boolean
            type:
              enum:
                - JSON_PATH
            jsonPath:
              type: string
        - type: object
          description: "parameter body matcher"
          additionalProperties: false
          properties:
            not:
              type: boolean
            type:
              enum:
                - PARAMETERS
            parameters:
              $ref: "#/components/schemas/KeyToMultiValue"
        - type: object
          description: "regex body matcher"
          additionalProperties: false
          properties:
            not:
              type: boolean
            type:
              enum:
                - REGEX
            regex:
              type: string
        - type: object
          description: "string body matcher"
          additionalProperties: false
          properties:
            not:
              type: boolean
            type:
              enum:
                - STRING
            string:
              type: string
            contentType:
              type: string
            subString:
              type: boolean
        - type: string
          description: "substring body matcher"
        - type: object
          description: "xml body matcher"
          additionalProperties: false
          properties:
            not:
              type: boolean
            type:
              enum:
                - XML
            xml:
              type: string
            contentType:
              type: string
        - type: object
          description: "xml schema body matcher"
          additionalProperties: false
          properties:
            not:
              type: boolean
            type:
              enum:
                - XML_SCHEMA
            xmlSchema:
              type: string
        - type: object
          description: "xpath body matcher"
          additionalProperties: false
          properties:
            not:
              type: boolean
            type:
              enum:
                - XPATH
            xpath:
              type: string
    BodyWithContentType:
      description: "response body"
      anyOf:
        - type: object
          description: "binary response body"
          additionalProperties: false
          properties:
            not:
              type: boolean
            type:
              enum:
                - BINARY
            base64Bytes:
              type: string
            contentType:
              type: string
        - type: object
          description: "json response body"
          additionalProperties: false
          properties:
            not:
              type: boolean
            type:
              enum:
                - JSON
            json:
              type: string
            contentType:
              type: string
        - type: object
          description: "json response body"
          additionalProperties: true
        - type: object
          description: "string response body"
          additionalProperties: false
          properties:
            not:
              type: boolean
            type:
              enum:
                - STRING
            string:
              type: string
            contentType:
              type: string
        - type: string
          description: "string response body"
        - type: object
          description: "xml response body"
          additionalProperties: false
          properties:
            not:
              type: boolean
            type:
              enum:
                - XML
            xml:
              type: string
            contentType:
              type: string
        - type: object
          description: "file response body — served from a file, optionally rendered as a template against the request"
          additionalProperties: false
          properties:
            not:
              type: boolean
            type:
              enum:
                - FILE
            filePath:
              type: string
            templateType:
              enum:
                - VELOCITY
                - MUSTACHE
            contentType:
              type: string
    Delay:
      description: "response delay"
      type: object
      additionalProperties: false
      properties:
        timeUnit:
          enum:
            - DAYS
            - HOURS
            - MINUTES
            - SECONDS
            - MILLISECONDS
            - MICROSECONDS
            - NANOSECONDS
        value:
          type: integer
        template:
          type: string
          description: "opt-in template rendered against the request whose output is parsed as a millisecond delay (e.g. respond more slowly for larger payloads); falls back to value/timeUnit on a non-numeric or blank result"
        templateType:
          type: string
          description: "template engine used to evaluate the delay template; only VELOCITY and MUSTACHE are supported"
          enum:
            - VELOCITY
            - MUSTACHE
        distribution:
          type: object
          additionalProperties: false
          description: "distribution for variable delays: UNIFORM requires min and max, LOG_NORMAL requires median and p99, GAUSSIAN requires mean and stdDev"
          required:
            - type
          properties:
            type:
              type: string
              enum:
                - UNIFORM
                - LOG_NORMAL
                - GAUSSIAN
            min:
              type: integer
              minimum: 0
            max:
              type: integer
              minimum: 0
            median:
              type: integer
              minimum: 1
            p99:
              type: integer
              minimum: 1
            mean:
              type: integer
              minimum: 0
            stdDev:
              type: integer
              minimum: 0
    RecoverAfter:
      description: "fail the first failTimes matches then serve the configured response (deterministic retry/backoff recovery primitive)"
      type: object
      additionalProperties: false
      properties:
        failTimes:
          type: integer
          description: "number of leading matches that serve the failure response before the configured response is served; null or <= 0 makes this inert"
        failResponse:
          $ref: "#/components/schemas/HttpResponse"
        idempotencyHeader:
          type: string
          description: "optional request header whose value keys an independent failure window per (expectation, header-value); when absent on a request the per-expectation match count is used"
    ConnectionOptions:
      description: "connection options"
      type: object
      additionalProperties: false
      properties:
        suppressContentLengthHeader:
          type: boolean
        contentLengthHeaderOverride:
          type: integer
        suppressConnectionHeader:
          type: boolean
        chunkSize:
          type: integer
        keepAliveOverride:
          type: boolean
        closeSocket:
          type: boolean
        closeSocketDelay:
          $ref: "#/components/schemas/Delay"
    Verification:
      description: "verification"
      type: object
      additionalProperties: false
      properties:
        expectationId:
          $ref: "#/components/schemas/ExpectationId"
        httpRequest:
          $ref: "#/components/schemas/RequestDefinition"
        httpResponse:
          $ref: "#/components/schemas/HttpResponse"
        times:
          $ref: "#/components/schemas/VerificationTimes"
        maximumNumberOfRequestToReturnInVerificationFailure:
          type: integer
      oneOf:
        - required:
            - expectationId
        - required:
            - httpRequest
        - required:
            - httpResponse
          not:
            anyOf:
              - required:
                  - expectationId
              - required:
                  - httpRequest
    VerificationTimes:
      description: "number of request to verify"
      type: object
      additionalProperties: false
      properties:
        atLeast:
          type: integer
        atMost:
          type: integer
    VerificationSequence:
      description: "verification sequence"
      type: object
      additionalProperties: false
      properties:
        expectationIds:
          type: array
          additionalProperties: false
          items:
            $ref: "#/components/schemas/ExpectationId"
        httpRequests:
          type: array
          items:
            $ref: "#/components/schemas/RequestDefinition"
        httpResponses:
          type: array
          items:
            $ref: "#/components/schemas/HttpResponse"
        maximumNumberOfRequestToReturnInVerificationFailure:
          type: integer
      oneOf:
        - required:
            - expectationIds
        - required:
            - httpRequests
        - required:
            - httpResponses
          not:
            anyOf:
              - required:
                  - expectationIds
              - required:
                  - httpRequests
    ClockRequest:
      description: "clock control request"
      type: object
      additionalProperties: false
      required:
        - action
      properties:
        action:
          type: string
          enum: [ "freeze", "advance", "reset" ]
          description: >-
            freeze: freeze the clock at the given instant (or current time if instant is omitted);
            advance: advance the frozen clock by durationMillis (freezes first if not already frozen);
            reset: reset the clock to real wall-clock time
        instant:
          type: string
          format: date-time
          description: "ISO-8601 instant to freeze at (only used with action 'freeze'; omit to freeze at current time)"
        durationMillis:
          type: integer
          format: int64
          minimum: 1
          description: "number of milliseconds to advance the clock by (required when action is 'advance')"
    ClockResponse:
      description: "clock control response after a freeze, advance, or reset action"
      type: object
      additionalProperties: false
      properties:
        status:
          type: string
          description: "the action that was performed (freeze, advance, or reset)"
        currentInstant:
          type: string
          format: date-time
          description: "the current server clock instant after the action"
        currentEpochMillis:
          type: integer
          format: int64
          description: "the current server clock time as epoch milliseconds after the action"
    ClockStatus:
      description: "clock status response"
      type: object
      additionalProperties: false
      properties:
        currentInstant:
          type: string
          format: date-time
          description: "the current server clock instant"
        currentEpochMillis:
          type: integer
          format: int64
          description: "the current server clock time as epoch milliseconds"
        frozen:
          type: boolean
          description: "true if the clock is currently frozen"
    Ports:
      description: "list of ports"
      type: object
      additionalProperties: false
      properties:
        ports:
          items:
            type: number
          type: array
    HttpRequestAndHttpResponse:
      description: "request and response"
      type: object
      additionalProperties: false
      properties:
        httpRequest:
          $ref: "#/components/schemas/HttpRequest"
        httpResponse:
          $ref: "#/components/schemas/HttpResponse"
        timestamp:
          type: string
    CrudExpectationsDefinition:
      description: "definition of a generated CRUD data store backed REST resource"
      type: object
      additionalProperties: false
      required:
        - basePath
      properties:
        basePath:
          type: string
          description: "base path the CRUD resource is served under (e.g. /api/users)"
        idField:
          type: string
          default: "id"
          description: "name of the field used as the resource identifier"
        idStrategy:
          type: string
          enum: [ "AUTO_INCREMENT", "UUID" ]
          default: "AUTO_INCREMENT"
          description: "strategy used to generate identifiers for newly created resources"
        initialData:
          type: array
          description: "initial records to seed the data store with"
          items:
            type: object
    FileStoreRequest:
      description: "file to store in the in-memory file store"
      type: object
      additionalProperties: false
      required:
        - name
        - content
      properties:
        name:
          type: string
          description: "name to store the file under"
        content:
          type: string
          description: "file content, either plain text or base64-encoded when base64 is true"
        base64:
          type: boolean
          default: false
          description: "when true, content is treated as base64-encoded binary data"
    ServiceChaosRequest:
      description: "service-scoped HTTP chaos registration, removal or clear instruction"
      type: object
      additionalProperties: true
      properties:
        host:
          type: string
          description: "downstream host the chaos profile applies to (mutually exclusive with clear)"
        chaos:
          type: object
          description: "HTTP chaos profile (fault types, probabilities, error status, etc.); omit (or set remove:true) to remove the host's profile"
        remove:
          type: boolean
          description: "when true, removes the named host's chaos profile"
        clear:
          type: boolean
          description: "when true, clears all service-scoped chaos (mutually exclusive with host)"
        ttlMillis:
          type: integer
          format: int64
          minimum: 1
          description: "optional time-to-live in milliseconds after which the registration auto-reverts"
    HttpChaosProfile:
      description: "chaos profile controlling fault injection for a host or expectation"
      type: object
      additionalProperties: true
      properties:
        errorStatus:
          type: integer
          description: "HTTP error status code to return instead of the real response"
        errorProbability:
          type: number
          description: "probability (0.0 to 1.0) that a request triggers the error"
        latency:
          type: object
          properties:
            value:
              type: integer
            timeUnit:
              type: string
        connectionDrop:
          type: boolean
          description: "when true, drops the TCP connection without responding"
        seed:
          type: integer
          description: "fixed seed for deterministic probabilistic outcomes"
    RateLimit:
      description: "declarative protocol-agnostic rate limit / quota"
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: "Shared counter key; expectations with the same name share one rate-limit counter. When omitted the expectation id is used as the key"
        algorithm:
          type: string
          enum:
            - fixed_window
            - token_bucket
          description: "Rate-limiting algorithm; defaults to fixed_window"
        limit:
          type: integer
          minimum: 1
          description: "fixed_window: maximum requests allowed per window before requests are rejected"
        windowMillis:
          type: integer
          minimum: 1
          description: "fixed_window: fixed-window length in milliseconds"
        burst:
          type: integer
          minimum: 1
          description: "token_bucket: bucket capacity in tokens"
        refillPerSecond:
          type: number
          exclusiveMinimum: 0
          description: "token_bucket: token refill rate per second"
        errorStatus:
          type: integer
          minimum: 100
          maximum: 599
          description: "Status returned when the request is over-limit (default 429)"
        retryAfter:
          type: string
          maxLength: 100
          description: "Literal Retry-After header value; when omitted it is computed from the window/bucket reset time"
    RampCurve:
      type: string
      enum: [LINEAR, EXPONENTIAL, QUADRATIC]
      description: "interpolation curve used to ramp a value across a stage: LINEAR (constant slope), QUADRATIC (ease-in), EXPONENTIAL (steeper ease-in). Only meaningful for ramp stages; ignored for holds and pauses."
    LoadStageType:
      type: string
      enum: [VU, RATE, PAUSE]
      description: "VU = closed model (hold/ramp concurrent virtual users); RATE = open model (hold/ramp an arrival rate in iterations/second); PAUSE = drive no load."
    LoadStage:
      description: "one stage of a load profile, run in sequence: holds or ramps a setpoint for its duration"
      type: object
      additionalProperties: false
      required:
        - type
        - durationMillis
      properties:
        type:
          $ref: "#/components/schemas/LoadStageType"
        durationMillis:
          type: integer
          format: int64
          description: "how long this stage runs in milliseconds (> 0); the sum across all stages is the total run length (max 3600000 = 1h)"
        curve:
          $ref: "#/components/schemas/RampCurve"
        vus:
          type: integer
          description: "VU hold: the number of virtual users to hold for the stage (max 50)"
        startVus:
          type: integer
          description: "VU ramp: virtual users at the start of the ramp"
        endVus:
          type: integer
          description: "VU ramp: virtual users at the end of the ramp (max 50)"
        rate:
          type: number
          description: "RATE hold: arrival rate to hold, in iterations per second (max 5000)"
        startRate:
          type: number
          description: "RATE ramp: arrival rate at the start of the ramp, in iterations per second"
        endRate:
          type: number
          description: "RATE ramp: arrival rate at the end of the ramp, in iterations per second (max 5000)"
        maxVus:
          type: integer
          description: "RATE stage only: optional cap on the auto-scaling virtual-user pool that runs the started iterations (defaults to the global virtual-user cap)"
    LoadShapeType:
      type: string
      enum: [SPIKE, STAIRS, RAMP_HOLD]
      description: "named load shape: SPIKE (ramp up, hold the peak, ramp back down, optional recovery hold); STAIRS (a flight of pure-hold steps, each one 'step' higher); RAMP_HOLD (ramp 0 to target then hold)."
    LoadShapeMetric:
      type: string
      enum: [VU, RATE]
      description: "what the shape drives: VU = concurrent virtual users (closed model); RATE = arrival rate in iterations/second (open model). A shape expands into ordinary LoadStage stages of this type."
    LoadShape:
      description: "a declarative named load shape that expands into ordinary stages; only the parameters its 'type' needs are read, the rest are ignored. Use a shape OR an explicit 'stages' list, not both."
      type: object
      additionalProperties: false
      required:
        - type
      properties:
        type:
          $ref: "#/components/schemas/LoadShapeType"
        metric:
          $ref: "#/components/schemas/LoadShapeMetric"
        curve:
          $ref: "#/components/schemas/RampCurve"
        baseline:
          type: number
          description: "SPIKE: the level held before and after the spike"
        peak:
          type: number
          description: "SPIKE: the level held at the top of the spike"
        rampUpMillis:
          type: integer
          format: int64
          description: "SPIKE: duration of the baseline to peak ramp"
        holdMillis:
          type: integer
          format: int64
          description: "SPIKE: duration to hold at the peak; RAMP_HOLD: duration to hold at the target"
        rampDownMillis:
          type: integer
          format: int64
          description: "SPIKE: duration of the peak to baseline ramp"
        recoveryHoldMillis:
          type: integer
          format: int64
          description: "SPIKE (optional): duration to hold at baseline after the down ramp"
        start:
          type: number
          description: "STAIRS: the level of the first step"
        step:
          type: number
          description: "STAIRS: how much each step rises above the previous one"
        steps:
          type: integer
          description: "STAIRS: the number of steps"
        stepDurationMillis:
          type: integer
          format: int64
          description: "STAIRS: how long each step holds at its level"
        target:
          type: number
          description: "RAMP_HOLD: the level ramped up to (from 0) and then held"
        rampMillis:
          type: integer
          format: int64
          description: "RAMP_HOLD: duration of the 0 to target ramp"
    LoadProfile:
      description: "describes the load over time, as EITHER an ordered list of 'stages' OR a single named 'shape' (which expands into stages). Set one, not both; if both are set the explicit stages win."
      type: object
      additionalProperties: false
      properties:
        stages:
          type: array
          description: "ordered stages run one after another (max 20). Each holds or ramps virtual users (VU, closed model) or an arrival rate (RATE, open model), or pauses (PAUSE)."
          items:
            $ref: "#/components/schemas/LoadStage"
        shape:
          $ref: "#/components/schemas/LoadShape"
    LoadStep:
      description: "a single templated request step in a load scenario"
      type: object
      additionalProperties: false
      required:
        - request
      properties:
        request:
          $ref: "#/components/schemas/HttpRequest"
        thinkTime:
          type: object
          description: "optional inter-step pause (a Delay)"
          properties:
            timeUnit:
              type: string
            value:
              type: integer
        name:
          type: string
          description: "optional human label for this step; used as the 'step' metric label (otherwise the step index is used) and may be used as the low-cardinality 'route' metric label in place of the templatised request path"
        labels:
          type: object
          additionalProperties:
            type: string
          description: "optional step-level custom annotation labels, merged over the scenario labels (step keys win); exported as OpenTelemetry attributes on every load measurement and as allowlisted Prometheus labels"
        captures:
          type: array
          description: "optional cross-step capture rules applied to this step's response. Each binds an extracted value to a variable name visible to SUBSEQUENT steps in the same iteration via $iteration.captured.<name> (Velocity) / {{iteration.captured.<name>}} (Mustache), in path, body and header templates. Scope is per-iteration (one virtual user's single pass through the steps)."
          items:
            $ref: "#/components/schemas/LoadCapture"
    LoadCapture:
      description: "a declarative cross-step capture / correlation rule: extracts a value from a step's response and binds it to a variable name that a later step in the same iteration can reference from its templated request fields. Best-effort: on no match it falls back to defaultValue (when set) or leaves the variable unset, never failing the run."
      type: object
      additionalProperties: false
      required:
        - name
        - source
        - expression
      properties:
        name:
          type: string
          description: "the variable name later steps reference (e.g. 'token' for $iteration.captured.token)"
        source:
          type: string
          enum: [BODY_JSONPATH, HEADER, BODY_REGEX]
          description: "where to extract from: a JSONPath over the response body, a response header value, or a regex over the response body string"
        expression:
          type: string
          description: "the JSONPath (BODY_JSONPATH), header name (HEADER), or regex (BODY_REGEX, capture group 1) driving the extraction"
        defaultValue:
          type: string
          description: "optional fallback value bound to the variable when extraction yields nothing; when omitted the variable is left unset on no match"
    LoadThreshold:
      description: "an in-run pass/fail threshold for a load scenario: a per-run metric compared against a value. All thresholds must hold for the run verdict to be PASS (logical AND); any breach makes the verdict FAIL. Evaluated from this run's own latency histogram and counters, not the global SLO sample store."
      type: object
      additionalProperties: false
      required:
        - metric
        - comparator
        - threshold
      properties:
        metric:
          type: string
          enum: [LATENCY_P50, LATENCY_P95, LATENCY_P99, LATENCY_P999, ERROR_RATE, THROUGHPUT_RPS]
          description: "the per-run metric to evaluate: latency percentiles in milliseconds, ERROR_RATE as a 0.0-1.0 fraction, THROUGHPUT_RPS as requests/second over the run's elapsed time"
        comparator:
          type: string
          enum: [LESS_THAN, LESS_THAN_OR_EQUAL, GREATER_THAN, GREATER_THAN_OR_EQUAL]
          description: "how the observed per-run value is compared to the threshold"
        threshold:
          type: number
          description: "the threshold value (milliseconds for latency metrics, a 0.0-1.0 fraction for ERROR_RATE, requests/second for THROUGHPUT_RPS)"
    LoadPacing:
      description: "adaptive iteration pacing (think-time) for a load scenario: a target per-virtual-user iteration cycle time. After a closed-model VU finishes one pass through the steps, the orchestrator waits whatever remains of the target cycle before launching that VU's next iteration; on overrun the next iteration starts immediately (no wait). Applies only to the closed-model VU loop — open-model RATE iterations ignore it, their arrival rate already governing spacing — and composes with per-step thinkTime. In-flight latency measurement is unchanged; pacing only affects when the next iteration launches."
      type: object
      additionalProperties: false
      required:
        - mode
        - value
      properties:
        mode:
          type: string
          enum: [NONE, CONSTANT_PACING, CONSTANT_THROUGHPUT]
          default: NONE
          description: "how the target iteration cycle is derived from value: NONE = no pacing (immediate reschedule); CONSTANT_PACING = value is the target cycle in milliseconds; CONSTANT_THROUGHPUT = value is the target iterations/second per VU (cycle = 1000 / value ms)"
        value:
          type: number
          description: "for CONSTANT_PACING the target cycle in milliseconds; for CONSTANT_THROUGHPUT the target iterations/second per VU. Must be > 0 when mode is not NONE; ignored when mode is NONE."
    LoadFeeder:
      description: "parameterized test data (a data feeder) for a load scenario: an inline dataset from which one row is selected per iteration and exposed to that iteration's templated request path, body and headers as $iteration.data.<column> (Velocity) / {{iteration.data.<column>}} (Mustache). The dataset is always inline (no external URL or file source). Supply EITHER rows (inline list of objects, the primary form) OR data + format (raw CSV/JSON parsed server-side); when both are given rows wins."
      type: object
      additionalProperties: false
      properties:
        rows:
          type: array
          description: "inline dataset: a list of column-name to value maps, one per row (the primary mechanism; round-trips with no parsing). Must be non-empty when used."
          items:
            type: object
            additionalProperties:
              type: string
        data:
          type: string
          description: "optional raw inline dataset parsed server-side into rows per format. CSV: first line is the header row (RFC 4180-ish — embedded commas, doubled quotes and newlines are handled). JSON: an array of flat objects. The raw text is preserved verbatim on round-trip (the derived rows are not re-serialized). Ignored when rows is set."
        format:
          type: string
          enum: [CSV, JSON]
          description: "the format of data (required when data is set)"
        strategy:
          type: string
          enum: [CIRCULAR, RANDOM, SEQUENTIAL]
          default: CIRCULAR
          description: "how a row is chosen each iteration: CIRCULAR (default) cycles rows[globalIteration % size] and never exhausts; RANDOM picks a uniformly random row each iteration; SEQUENTIAL uses rows[globalIteration] once each in order and COMPLETES the run once the dataset is exhausted (data-driven replay-once)."
    LoadScenario:
      description: "an API-driven load scenario: ordered templated steps driven at a target concurrency. The name is the unique registry key — PUT loads (registers) it; PUT /loadScenario/start triggers it to run."
      type: object
      additionalProperties: false
      required:
        - name
        - profile
        - steps
      properties:
        name:
          type: string
          description: "scenario name — the unique registry key. Loading the same name replaces the prior definition."
        templateType:
          type: string
          enum: [VELOCITY, MUSTACHE]
          default: VELOCITY
          description: "template engine used to render the per-iteration request path and body; only VELOCITY and MUSTACHE are supported for load steps (JAVASCRIPT is rejected)"
        maxRequests:
          type: integer
          description: "optional hard cap on the total number of requests dispatched"
        startDelayMillis:
          type: integer
          format: int64
          default: 0
          description: "delay in milliseconds, applied after this scenario is triggered to start, before its iterations begin. A positive value means the scenario is PENDING until the delay elapses, then RUNNING; 0 (default) starts immediately on trigger. Lets several triggered scenarios begin at staggered offsets."
        labels:
          type: object
          additionalProperties:
            type: string
          description: "optional scenario-level custom annotation labels; exported as OpenTelemetry attributes on every load measurement and (for keys named in the loadGenerationMetricLabels allowlist) as extra Prometheus labels"
        thresholds:
          type: array
          description: "optional in-run pass/fail thresholds; the run carries a PASS verdict iff all hold, FAIL otherwise. Empty/omitted means no verdict is computed."
          items:
            $ref: "#/components/schemas/LoadThreshold"
        abortOnFail:
          type: boolean
          default: false
          description: "when true, a FAIL verdict aborts the run early (terminal STOPPED state, abortedByThreshold set); default false (the run always finishes its stages and carries a final verdict)"
        abortGraceMillis:
          type: integer
          format: int64
          default: 0
          description: "suppress abortOnFail for the first N milliseconds of the run so noisy startup samples cannot trigger a premature abort (thresholds are still evaluated and a verdict still reported during the grace window — only the abort action is deferred)"
        pacing:
          $ref: "#/components/schemas/LoadPacing"
        feeder:
          $ref: "#/components/schemas/LoadFeeder"
        profile:
          $ref: "#/components/schemas/LoadProfile"
        steps:
          type: array
          description: "ordered list of request steps fired in sequence each iteration (max 50)"
          items:
            $ref: "#/components/schemas/LoadStep"
    LoadScenarioListEntry:
      description: "a registered load scenario with its lifecycle state, start delay, definition, and live/terminal status fields"
      type: object
      properties:
        name:
          type: string
        state:
          type: string
          enum: [LOADED, PENDING, RUNNING, COMPLETED, STOPPED]
        startDelayMillis:
          type: integer
          format: int64
        definition:
          $ref: "#/components/schemas/LoadScenario"
        elapsedMillis:
          type: integer
          format: int64
        currentVus:
          type: integer
          description: "live count of active virtual users (present when running)"
        stageIndex:
          type: integer
          description: "0-based index of the currently-running stage (present when running)"
        stageType:
          type: string
          enum: [VU, RATE, PAUSE]
        currentTarget:
          type: number
          description: "current setpoint for the running stage: target virtual users (VU), arrival rate in iterations/second (RATE), or 0 (PAUSE)"
        requestsSent:
          type: integer
          format: int64
        succeeded:
          type: integer
          format: int64
        failed:
          type: integer
          format: int64
        p50Millis:
          type: number
        p95Millis:
          type: number
        p99Millis:
          type: number
        p999Millis:
          type: number
          description: "99.9th-percentile coordinated-omission-corrected latency (ms), from the per-run HDR histogram; available even when metrics are disabled"
        droppedIterations:
          type: integer
          format: int64
          description: "iterations that were due but never dispatched because a safety cap was hit (sum of rate_limit and inflight_cap throttles for this run)"
        verdict:
          type: string
          enum: [PASS, FAIL]
          description: "in-run threshold verdict: PASS (all thresholds satisfied) or FAIL (any breached); absent when the scenario has no thresholds or none has been evaluated yet. A terminal FAIL should be mapped by clients to a non-zero CI exit code."
        abortedByThreshold:
          type: boolean
          default: false
          description: "true when this run was terminated early by an abortOnFail threshold breach; absent means false"
        thresholdResults:
          type: array
          description: "per-threshold results behind the verdict (present when thresholds were evaluated)"
          items:
            type: object
            properties:
              metric:
                type: string
                enum: [LATENCY_P50, LATENCY_P95, LATENCY_P99, LATENCY_P999, ERROR_RATE, THROUGHPUT_RPS]
              comparator:
                type: string
                enum: [LESS_THAN, LESS_THAN_OR_EQUAL, GREATER_THAN, GREATER_THAN_OR_EQUAL]
              threshold:
                type: number
              observed:
                type: number
                description: "the observed per-run value at evaluation time (latency ms, error-rate fraction, or requests/second)"
              satisfied:
                type: boolean
        runId:
          type: string
        startedAt:
          type: integer
          format: int64
        endedAt:
          type: integer
          format: int64
    LoadScenarioReport:
      description: >-
        end-of-run summary report for a load scenario run (JSON form). A JUnit-XML rendering of the same
        data is returned instead when the report endpoint is called with ?format=junit (Content-Type
        application/xml).
      type: object
      properties:
        scenario:
          type: string
        runId:
          type: string
        state:
          type: string
          enum: [LOADED, PENDING, RUNNING, COMPLETED, STOPPED]
        verdict:
          type: string
          enum: [PASS, FAIL]
          description: "in-run threshold verdict; absent when the scenario has no thresholds or none has been evaluated yet"
        abortedByThreshold:
          type: boolean
          description: "true when this run was terminated early by an abortOnFail threshold breach"
        timing:
          type: object
          properties:
            startedAtEpochMillis:
              type: integer
              format: int64
            endedAtEpochMillis:
              type: integer
              format: int64
              nullable: true
              description: "epoch-millis the run ended; null while still running"
            durationMillis:
              type: integer
              format: int64
              description: "elapsed run time in milliseconds"
        counts:
          type: object
          properties:
            requestsSent:
              type: integer
              format: int64
            succeeded:
              type: integer
              format: int64
            failed:
              type: integer
              format: int64
            droppedIterations:
              type: integer
              format: int64
            errorRate:
              type: number
              description: "failed / max(1, requestsSent)"
        latencyMillis:
          type: object
          properties:
            p50:
              type: integer
              format: int64
            p95:
              type: integer
              format: int64
            p99:
              type: integer
              format: int64
            p999:
              type: integer
              format: int64
        thresholdResults:
          type: array
          description: "per-threshold results behind the verdict"
          items:
            type: object
            properties:
              metric:
                type: string
                enum: [LATENCY_P50, LATENCY_P95, LATENCY_P99, LATENCY_P999, ERROR_RATE, THROUGHPUT_RPS]
              comparator:
                type: string
                enum: [LESS_THAN, LESS_THAN_OR_EQUAL, GREATER_THAN, GREATER_THAN_OR_EQUAL]
              threshold:
                type: number
              observed:
                type: number
              satisfied:
                type: boolean
    SloObjective:
      description: "a single service-level objective over the recorded SLI samples"
      type: object
      additionalProperties: false
      required:
        - sli
        - comparator
        - threshold
      properties:
        sli:
          type: string
          enum: [LATENCY_P50, LATENCY_P95, LATENCY_P99, ERROR_RATE]
          description: "the service-level indicator to evaluate"
        comparator:
          type: string
          enum: [LESS_THAN, LESS_THAN_OR_EQUAL, GREATER_THAN, GREATER_THAN_OR_EQUAL]
          description: "how the observed value is compared to the threshold"
        threshold:
          type: number
          description: "the objective threshold (milliseconds for latency SLIs, a 0.0-1.0 fraction for ERROR_RATE)"
        scope:
          type: string
          enum: [FORWARD, INBOUND]
          default: FORWARD
          description: "which recorded traffic to evaluate; v1 records only FORWARD (proxied/forwarded upstream) samples"
    SloCriteria:
      description: "a named set of service-level objectives over a time window"
      type: object
      additionalProperties: false
      required:
        - objectives
      properties:
        name:
          type: string
          description: "human-readable criteria name, echoed back in the verdict"
        window:
          type: object
          additionalProperties: false
          description: "the time window to evaluate over"
          properties:
            type:
              type: string
              enum: [LOOKBACK, EXPLICIT]
              default: LOOKBACK
            lookbackMillis:
              type: integer
              format: int64
              description: "LOOKBACK: window length ending now (uses the controllable clock)"
            fromEpochMillis:
              type: integer
              format: int64
              description: "EXPLICIT: window start in epoch milliseconds"
            toEpochMillis:
              type: integer
              format: int64
              description: "EXPLICIT: window end in epoch milliseconds"
        minimumSampleCount:
          type: integer
          description: "minimum samples required in the window; below this the verdict is INCONCLUSIVE"
        upstreamHosts:
          type: array
          items:
            type: string
          description: "optional list of upstream hosts to restrict the evaluation to"
        objectives:
          type: array
          items:
            $ref: "#/components/schemas/SloObjective"
    SloObjectiveResult:
      description: "the evaluated result of a single objective"
      type: object
      additionalProperties: false
      properties:
        sli:
          type: string
        comparator:
          type: string
        threshold:
          type: number
        observedValue:
          type: number
          nullable: true
        result:
          type: string
          enum: [PASS, FAIL, INCONCLUSIVE]
        detail:
          type: string
          nullable: true
          description: "human-readable explanation of the objective result (e.g. sample count, observed vs threshold)"
    SloVerdict:
      description: "the overall verdict of an SLO evaluation (the AND of all objective results)"
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        result:
          type: string
          enum: [PASS, FAIL, INCONCLUSIVE]
        windowFromEpochMillis:
          type: integer
          format: int64
        windowToEpochMillis:
          type: integer
          format: int64
        sampleCount:
          type: integer
        objectiveResults:
          type: array
          items:
            $ref: "#/components/schemas/SloObjectiveResult"
    PreemptionRequest:
      description: "preemption simulation parameters (all fields optional)"
      type: object
      additionalProperties: false
      properties:
        mode:
          type: string
          enum: [reject503, goaway, both]
          default: both
          description: "how draining is signalled: reject503 = 503 + Connection: close; goaway = HTTP/2 GOAWAY frame; both = both"
        drainMillis:
          type: integer
          format: int64
          description: "how long in-flight requests are allowed to drain; defaults to the stopDrainMillis property, clamped to preemptionSimulationMaxDrainMillis"
        ttlMillis:
          type: integer
          format: int64
          description: "auto-uncordon after this many milliseconds (dead-man's switch); 0 (default) means no auto-uncordon"
        lastStreamId:
          type: integer
          format: int64
          description: "HTTP/2 GOAWAY last_stream_id to advertise; -1 (default) lets the server choose"
    PreemptionStatus:
      description: "current cordon/drain status of the server"
      type: object
      additionalProperties: false
      properties:
        state:
          type: string
          enum: [inactive, draining, drained]
        inFlight:
          type: integer
          description: "number of requests currently in flight"
        drainRemainingMillis:
          type: integer
          format: int64
          description: "milliseconds left in the drain window"
        mode:
          type: string
          enum: [reject503, goaway, both]
          description: "active signalling mode (omitted when inactive)"
    ChaosExperiment:
      description: "a scheduled multi-stage chaos experiment definition (the body of PUT /mockserver/chaosExperiment)"
      type: object
      additionalProperties: false
      required:
        - stages
      properties:
        name:
          type: string
          description: "human-readable experiment name (ignored when saved under a path {name})"
        loop:
          type: boolean
          description: "whether to loop back to stage 0 after the last stage completes (default false)"
        stages:
          type: array
          description: "ordered sequence of stages"
          items:
            type: object
            additionalProperties: false
            required:
              - durationMillis
              - profiles
            properties:
              durationMillis:
                type: integer
                format: int64
                description: "how long this stage runs before advancing (max 86400000 = 24h)"
              profiles:
                type: object
                description: "map of host -> chaos profile to apply during this stage"
                additionalProperties:
                  $ref: "#/components/schemas/HttpChaosProfile"
    ContractTestRequest:
      description: "request to run an OpenAPI spec as a contract test against a live service"
      type: object
      additionalProperties: false
      required:
        - spec
        - baseUrl
      properties:
        spec:
          type: string
          description: "the OpenAPI spec as a URL, file path, or inline JSON/YAML (alias: specUrlOrPayload)"
        specUrlOrPayload:
          type: string
          description: "alias for spec"
        baseUrl:
          type: string
          description: "base URL of the live service under test; any path prefix is prepended to each operation path"
        operationId:
          type: string
          description: "optional — restrict the run to a single operation; when absent all operations are tested"
    ContractTestReport:
      description: "the result of a contract test run"
      type: object
      additionalProperties: false
      properties:
        baseUrl:
          type: string
        totalOperations:
          type: integer
        passed:
          type: integer
        failed:
          type: integer
        allPassed:
          type: boolean
        results:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              operationId:
                type: string
              method:
                type: string
              path:
                type: string
              statusCodeReceived:
                type: integer
              passed:
                type: boolean
              validationErrors:
                type: array
                items:
                  type: string
