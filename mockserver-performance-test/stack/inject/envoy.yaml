# Envoy as a near-infinite HTTP sink for the MockServer load-injection harness.
#
# Every request to the :8000 listener returns an immediate `200 OK` via
# `direct_response` — there is NO upstream cluster, so Envoy answers from its own
# event loop and can absorb far more traffic than the MockServer injectors can
# generate. That makes the *injector* the provable bottleneck, which is the whole
# point of the ceiling / scaling measurement.
#
# Admin (and Prometheus stats) live on :9901 — scrape `/stats/prometheus`. The
# received-request counters used by run-inject.sh are the per-listener downstream
# counters, e.g.
#   envoy_http_downstream_rq_completed{envoy_http_conn_manager_prefix="ingress_http"}
#   envoy_http_downstream_rq_xx{envoy_response_code_class="2",...}
admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }

static_resources:
  listeners:
    - name: sink_listener
      address:
        socket_address: { address: 0.0.0.0, port_value: 8000 }
      # A large per-connection buffer + many worker threads keep the sink ahead
      # of the injectors. Envoy auto-scales workers to the cpuset it is given.
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                # Trim per-request work to the minimum so the sink stays cheap:
                # no access log, no tracing, generated-by header off.
                generate_request_id: false
                route_config:
                  name: sink_route
                  virtual_hosts:
                    - name: sink
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          direct_response:
                            status: 200
                            body: { inline_string: "OK" }
                http_filters:
                  # Drain any request body BEFORE direct_response. With a request
                  # body, Envoy's direct_response path doesn't consume the body and
                  # so closes the connection (`connection: close`) to avoid HTTP
                  # desync — which, under keep-alive load, churns the injector's
                  # connection pool and floods kind="connection" errors (the simple
                  # GET ceiling has no body and stays clean). Calling body(true)
                  # here consumes the body so the connection is kept alive. Bodyless
                  # requests (the simple GET ceiling) skip the buffering entirely,
                  # so the sink stays cheap for them.
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      default_source_code:
                        inline_string: |
                          function envoy_on_request(request_handle)
                            local cl = request_handle:headers():get("content-length")
                            local te = request_handle:headers():get("transfer-encoding")
                            if (cl ~= nil and cl ~= "0") or te ~= nil then
                              request_handle:body(true)
                            end
                          end
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                      # The sink does no upstream work, so the dynamic-stats the
                      # router would otherwise emit per cluster are pointless.
                      dynamic_stats: false

layered_runtime:
  layers:
    - name: static_layer
      static_layer:
        # Allow plenty of concurrent downstream connections from the injectors.
        overload:
          global_downstream_max_connections: 200000
