steps:
  - label: ":s3: restore npm cache"
    command: ".buildkite/scripts/cache-restore.sh npm"
    timeout_in_minutes: 10
    soft_fail: true

  - wait

  - label: ":node: client-node lint and typecheck"
    command: ".buildkite/scripts/steps/node-client-lint.sh"
    timeout_in_minutes: 10

  - label: ":node: :docker: client-node functional tests"
    command: ".buildkite/scripts/steps/node-client-test.sh"
    timeout_in_minutes: 15

  # CANARY: browser integration tests via Playwright (headless Chromium).
  # soft_fail so this step does not block master while the new infra stabilises.
  # Promote to a hard gate once proven stable across multiple CI runs.
  - label: ":node: :chrome: client-node browser tests (canary)"
    command: ".buildkite/scripts/steps/node-client-browser-test.sh"
    timeout_in_minutes: 15
    soft_fail: true

  - label: ":node: node launcher lint"
    command: ".buildkite/scripts/steps/node-launcher-lint.sh"
    timeout_in_minutes: 10

  - label: ":node: :java: node launcher integration tests"
    command: ".buildkite/scripts/steps/node-launcher-test.sh"
    timeout_in_minutes: 15

  - wait: ~
    continue_on_failure: true

  - label: ":s3: save npm cache"
    command: ".buildkite/scripts/cache-save.sh npm"
    timeout_in_minutes: 10
    soft_fail: true
