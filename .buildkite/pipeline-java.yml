steps:
  - label: ":s3: restore maven cache"
    command: ".buildkite/scripts/cache-restore.sh maven"
    timeout_in_minutes: 10
    soft_fail: true

  - wait

  - label: ":lint-roller: opencode config"
    command: ".buildkite/scripts/steps/java-validate-config.sh"
    timeout_in_minutes: 5

  - label: ":docker: update docker image"
    command: "docker pull mockserver/mockserver:maven"

  - label: ":maven: build"
    command: ".buildkite/scripts/steps/java-build.sh"
    artifact_paths:
      - "**/*.log"
      - "**/target/surefire-reports/TEST-*.xml"
      - "**/target/surefire-reports/*-output.txt"
      - "**/target/failsafe-reports/TEST-*.xml"
      - "**/target/failsafe-reports/*-output.txt"
      # Upload only the machine-readable jacoco XML data files - per-class HTML
      # reports under jacoco/**/* produce hundreds of artifacts per module and
      # blow past Buildkite's 5000-artifact-per-job limit. The XML is what
      # downstream coverage tooling consumes; jacoco:check enforces the gate.
      - "**/target/site/jacoco/jacoco.xml"
      - "**/target/site/jacoco-it/jacoco.xml"
      # Bundled per-class jacoco HTML reports - one tarball for the whole reactor.
      # Download + extract to browse the rich coverage UI.
      - "mockserver/jacoco-html-reports.tar.gz"
      - "mockserver/mockserver-netty-no-dependencies/target/mockserver-netty-no-dependencies-*.jar"
      - "mockserver/mockserver-k8s-webhook/target/mockserver-k8s-webhook-*-jar-with-dependencies.jar"
    timeout_in_minutes: 60
    # The default queue is partly Spot; a reclaim mid-build kills the agent
    # (exit -1 / agent lost). Auto-retry so an infra eviction re-runs the long
    # build instead of failing it. Real test failures exit 1 and are NOT retried.
    retry:
      automatic:
        - exit_status: -1   # agent lost (e.g. Spot reclamation)
          limit: 2
        - exit_status: 255  # agent forced shutdown
          limit: 2

  - wait: ~
    continue_on_failure: true

  - label: ":junit: annotate test results"
    plugins:
      - junit-annotate#8a549e5220869601737287b4d6a9293703dc5a6f:  # v2.7.0
          artifacts: "**/target/*-reports/TEST-*.xml"
          always-annotate: true

  - label: ":chart_with_upwards_trend: test + coverage summary"
    command: ".buildkite/scripts/steps/java-summarize.sh"
    timeout_in_minutes: 5
    soft_fail: true

  - label: ":shield: diff-coverage gate (70%)"
    command: ".buildkite/scripts/steps/diff-coverage.sh"
    timeout_in_minutes: 5
    soft_fail: true

  - label: ":s3: save maven cache"
    command: ".buildkite/scripts/cache-save.sh maven"
    timeout_in_minutes: 15
    soft_fail: true

  - wait

  - label: ":nexus: deploy snapshot to Sonatype"
    if: "build.branch == 'master'"
    command: ".buildkite/scripts/steps/java-deploy-snapshot.sh"
    timeout_in_minutes: 30
    retry:
      automatic:
        - exit_status: -1   # agent lost (e.g. Spot reclamation)
          limit: 2
        - exit_status: 255  # agent forced shutdown
          limit: 2

  - label: ":docker: container integration tests"
    if: "build.branch == 'master'"
    command: ".buildkite/scripts/steps/container-tests-run.sh"
    timeout_in_minutes: 30
    retry:
      automatic:
        - exit_status: -1   # agent lost (e.g. Spot reclamation)
          limit: 2
        - exit_status: 255  # agent forced shutdown
          limit: 2

  - label: ":docker: build and push :snapshot"
    if: "build.branch == 'master'"
    command: ".buildkite/scripts/steps/java-docker-push-snapshot.sh"
    timeout_in_minutes: 30
    retry:
      automatic:
        - exit_status: -1   # agent lost (e.g. Spot reclamation)
          limit: 2
        - exit_status: 255  # agent forced shutdown
          limit: 2

  - label: ":package: publish snapshot binary bundles"
    if: "build.branch == 'master'"
    command: ".buildkite/scripts/steps/java-publish-snapshot-bundles.sh"
    timeout_in_minutes: 45
    soft_fail: true

  # DRAFT (2026-06-11): opt-in pre-release publish of the language clients so a release can
  # be smoke-tested from real registries before the release pipeline runs. Triggered by the
  # PUBLISH_CLIENT_SNAPSHOTS=true build env var (not every master build — pre-releases on
  # npm/PyPI/crates.io/NuGet are effectively permanent). Each client is gated on its registry
  # secret + CLI being present, so it soft-skips before the one-time manual provisioning is done.
  - label: ":package: publish client snapshots (opt-in)"
    if: "build.branch == 'master' && build.env('PUBLISH_CLIENT_SNAPSHOTS') == 'true'"
    command: ".buildkite/scripts/steps/clients-publish-snapshot.sh"
    timeout_in_minutes: 30
    soft_fail: true
