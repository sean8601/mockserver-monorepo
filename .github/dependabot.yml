version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/mockserver"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 20
    labels:
      - "dependencies"
      - "java"
    groups:
      maven-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # javax → jakarta namespace migration is not yet done — block versions
      # that require the jakarta namespace. `versions:` ignores apply to
      # security updates too (unlike `update-types`, which security updates
      # bypass).
      - dependency-name: "org.springframework:*"          # Spring 6.x = jakarta namespace
        versions: [">=6"]
      - dependency-name: "org.springframework.boot:*"     # Spring Boot 3.x = jakarta namespace
        versions: [">=3"]
      - dependency-name: "org.apache.tomcat.embed:*"      # Tomcat 10+ = jakarta namespace
        versions: [">=10"]
      - dependency-name: "org.eclipse.jetty:*"            # Jetty 10+ = jakarta namespace
        versions: [">=10"]
      # Defensive guard: javax.servlet:javax.servlet-api topped out at 4.0.1
      # (the jakarta migration republished under jakarta.servlet:*), so a v5
      # of this coordinate is not expected — block any future bump anyway.
      - dependency-name: "javax.servlet:*"
        versions: [">=5"]
      # Block Jakarta EE 9+ namespace migration (javax → jakarta, incompatible
      # with MockServer's javax codebase).
      - dependency-name: "jakarta.xml.bind:*"
        versions: [">=3"]
      - dependency-name: "jakarta.activation:*"
        versions: [">=2"]
      - dependency-name: "jakarta.validation:*"
        versions: [">=3"]

  - package-ecosystem: "maven"
    directory: "/mockserver/mockserver-maven-plugin"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "java"
      - "maven-plugin"
    groups:
      maven-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # javax → jakarta namespace migration — mirror /mockserver ignore rules.
      # `versions:` form applies to security updates too.
      - dependency-name: "org.springframework:*"          # Spring 6.x = jakarta namespace
        versions: [">=6"]
      - dependency-name: "org.springframework.boot:*"     # Spring Boot 3.x = jakarta namespace
        versions: [">=3"]

  - package-ecosystem: "npm"
    directories:
      - "/mockserver-ui"
      - "/mockserver-client-node"
      - "/mockserver-node"
      - "/.opencode"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    groups:
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "pip"
    directory: "/mockserver-client-python"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    groups:
      pip-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "bundler"
    directories:
      - "/mockserver-client-ruby"
      - "/jekyll-www.mock-server.com"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "ruby"
    groups:
      bundler-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "docker"
    directories:
      - "/docker"
      - "/docker/root"
      - "/docker/root-snapshot"
      - "/docker/snapshot"
      - "/docker/graaljs"
      - "/docker/local"
      - "/docker_build/maven"
      - "/docker_build/performance"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "docker"
    groups:
      docker-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "terraform"
    directories:
      - "/terraform/buildkite-agents"
      - "/terraform/buildkite-pipelines"
      - "/terraform/ses-email-forwarding"
      - "/terraform/website"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "terraform"
    groups:
      terraform-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
