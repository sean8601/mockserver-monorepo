# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
name: "CodeQL"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 22 * * 2'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Override automatic language detection by changing the below list
        # Supported options are ['csharp', 'cpp', 'go', 'java', 'javascript', 'python']
        language: ['java', 'javascript', 'python', 'ruby']

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Set up JDK 11
      if: matrix.language == 'java'
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Initialize CodeQL
      uses: github/codeql-action/init@f52b05f4acaaa234e44466e66d29050e135ea9ef  # v4.36.0
      with:
        languages: ${{ matrix.language }}

    - name: Build with Maven
      if: matrix.language == 'java'
      working-directory: mockserver
      # 'package' (not 'compile') is required: mockserver-examples depends on
      # the *-no-dependencies shaded jars, whose classes only exist after the
      # maven-shade-plugin runs in the package phase. A compile-only build
      # leaves those jars empty and mockserver-examples fails to compile.
      run: ./mvnw -B clean package -DskipTests -Dmaven.javadoc.skip=true
      env:
        MAVEN_OPTS: -Xmx2048m

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@f52b05f4acaaa234e44466e66d29050e135ea9ef  # v4.36.0
