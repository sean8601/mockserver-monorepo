# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
name: "CodeQL"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 22 * * 2'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Override automatic language detection by changing the below list
        # Supported options are ['csharp', 'cpp', 'go', 'java', 'javascript', 'python']
        language: ['java', 'javascript', 'python', 'ruby']

    steps:
    - name: Checkout repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

    - name: Set up JDK 17
      if: matrix.language == 'java'
      uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5.3.0
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Initialize CodeQL
      uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
      with:
        languages: ${{ matrix.language }}

    - name: Build with Maven
      if: matrix.language == 'java'
      working-directory: mockserver
      # 'package' (not 'compile') is required: mockserver-examples depends on
      # the *-no-dependencies shaded jars, whose classes only exist after the
      # maven-shade-plugin runs in the package phase. A compile-only build
      # leaves those jars empty and mockserver-examples fails to compile.
      run: ./mvnw -B clean package -DskipTests -Dmaven.javadoc.skip=true
      env:
        MAVEN_OPTS: -Xmx2048m

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
